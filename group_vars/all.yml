---
# This file contains all repeating variables, that can be set
# globally instead of parse Zuul inventory file to get proper value.
#### GLOBAL VARS ####
# NOTE(dpawlik): In some case, when we read variables from group_vars,
# HOME dir can be pointing to /var/lib/zuul, when it is not nested
# ansible execution. In that case, to avoid error that we might be
# pointing to the Zuul dir which is restricted or when the delegation
# would be use, safe way would be to replace Zuul HOME dir to
# /home/zuul, which is used in mostly.
ansible_user_dir: >-
  {{ '/home/zuul' if lookup('env', 'HOME').startswith('/var/lib/zuul/builds')
     else lookup('env', 'HOME') }}
cifmw_repo_relative: src/github.com/openstack-k8s-operators/ci-framework
cifmw_repo: "{{ ansible_user_dir }}/{{ cifmw_repo_relative }}"
cifmw_installyamls_repos_relative: src/github.com/openstack-k8s-operators/install_yamls
# since cifmw_installyamls_repos var already exists, let's use that and move all definition here in single place instead of creating another variable.
cifmw_installyamls_repos: "{{ ansible_user_dir }}/{{ cifmw_installyamls_repos_relative }}"
cifmw_architecture_repo_relative: src/github.com/openstack-k8s-operators/architecture
cifmw_architecture_repo: "{{ ansible_user_dir }}/{{ cifmw_architecture_repo_relative }}"

# vars for namespaces in openshift
cifmw_openstack_namespace: "{{ cifmw_install_yamls_defaults['NAMESPACE'] | default('openstack') }}"
operator_namespace: "{{ cifmw_install_yamls_defaults['OPERATOR_NAMESPACE'] | default('openstack-operators') }}"
cifmw_basedir: "{{ ansible_user_dir }}/ci-framework-data"
cifmw_manifests_dir: "{{ cifmw_basedir }}/artifacts/manifests"

# Default DNS servers to use across the framework
cifmw_default_dns_servers:
  - "1.1.1.1"
  - "8.8.8.8"

# set to false to enable logging of sensitive data
cifmw_nolog: true

# Vars for defaults which may change in the future
cifmw_default_registry: "quay.io"

cifmw_openstack_k8s_operators_org_url: "https://github.com/openstack-k8s-operators"

#### Pinned external projects dependencies ####
#
# These variables define the source URL and version for
# projects that ci-framework can either receive from Zuul (as a
# required-project checkout) or clone on its own when running
# outside Zuul or when the projects are not listed in required-projects.
#
# Roles reference these variables directly in their tasks.
# Jobs can override any of them via vars or extra-vars.

# ci-framework
cifmw_repo_url: "{{ cifmw_openstack_k8s_operators_org_url }}/ci-framework"
cifmw_repo_version_pin: "HEAD"

# repo-setup
cifmw_repo_setup_src: "{{ cifmw_openstack_k8s_operators_org_url }}/repo-setup"
cifmw_repo_setup_version_pin: "HEAD"

# install_yamls
# TODO, eventually we should rename cifmw_installyamls* to cifmw_install_yamls* vars
cifmw_installyamls_repo_url: "{{ cifmw_openstack_k8s_operators_org_url }}/install_yamls"
cifmw_install_yamls_version_pin: "HEAD"

# architecture
cifmw_architecture_repo_url: "{{ cifmw_openstack_k8s_operators_org_url }}/architecture"
cifmw_architecture_repo_version_pin: "HEAD"
