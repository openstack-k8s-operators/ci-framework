---
- name: "Run ci/playbooks/edpm/run.yml"
  hosts: "{{ cifmw_zuul_target_host | default('all') }}"
  gather_facts: true
  vars:
    cifmw_helpers_project_dir: "{{ ansible_user_dir }}/{{ zuul.projects['github.com/openstack-k8s-operators/ci-framework'].src_dir }}"
    cifmw_helpers_ansible_collection_dir: "{{ ansible_user_dir }}/.ansible/collections/ansible_collections"
    cifmw_helpers_no_log: false
  tasks:
    - name: Filter out host if needed
      when:
        - cifmw_zuul_target_host is defined
        - cifmw_zuul_target_host != 'all'
        - inventory_hostname != cifmw_zuul_target_host
      ansible.builtin.meta: end_host

    - name: Check for edpm-ansible.yml file
      ansible.builtin.stat:
        path: "{{ ansible_user_dir }}/ci-framework-data/artifacts/edpm-ansible.yml"
      register: edpm_file

    ###
    - name: Check if the ci-framework exists
      ansible.builtin.stat:
        path: "{{ cifmw_helpers_project_dir }}"
      register: _cifmw_helpers_project_dir_stat

    - name: Make symlink to local Ansible collection dir
      when: _cifmw_helpers_project_dir_stat.stat.exists
      block:
        - name: Check if cifmw general collection exists
          ansible.builtin.stat:
            path: "{{ cifmw_helpers_ansible_collection_dir }}/cifmw/general/plugins"
          register: _cifmw_gen_collection

        - name: Check if cifmw general collection exists
          when: not _cifmw_gen_collection.stat.exists
          block:
            - name: Workaround for earlier nested ansible execution
              ansible.builtin.file:
                path: "{{ cifmw_helpers_ansible_collection_dir }}/cifmw/general/"
                state: directory
                mode: "0755"

            - name: Create symlink to the local .ansible collection dir
              ansible.builtin.file:
                src: "{{ cifmw_helpers_project_dir }}/plugins"
                dest: "{{ cifmw_helpers_ansible_collection_dir }}/cifmw/general/plugins"
                state: link
                force: true

    - name: Run Podified EDPM deployment
      ansible.builtin.command:
        chdir: "{{ ansible_user_dir }}/src/github.com/openstack-k8s-operators/ci-framework"
        cmd: >-
          ansible-playbook deploy-edpm.yml
          -i "{{ ansible_user_dir }}/ci-framework-data/artifacts/zuul_inventory.yml"
          -e @scenarios/centos-9/base.yml
          -e @scenarios/centos-9/edpm_ci.yml
          {%- if edpm_file.stat.exists %}
          -e @{{ ansible_user_dir }}/ci-framework-data/artifacts/edpm-ansible.yml
          {%- endif %}
          {%- if cifmw_extras is defined %}
          {%-   for extra_var in cifmw_extras %}
          -e "{{   extra_var }}"
          {%-   endfor %}
          {%- endif %}
          -e "@{{ ansible_user_dir }}/ci-framework-data/artifacts/parameters/zuul-params.yml"

    - name: Run Podified EDPM post deployment
      ansible.builtin.command:
        chdir: "{{ ansible_user_dir }}/src/github.com/openstack-k8s-operators/ci-framework"
        cmd: >-
          ansible-playbook post-deployment.yml
          -i "{{ ansible_user_dir }}/ci-framework-data/artifacts/zuul_inventory.yml"
          -e @scenarios/centos-9/base.yml
          -e @scenarios/centos-9/edpm_ci.yml
          {%- if edpm_file.stat.exists %}
          -e @{{ ansible_user_dir }}/ci-framework-data/artifacts/edpm-ansible.yml
          {%- endif %}
          {%- if cifmw_extras is defined %}
          {%-   for extra_var in cifmw_extras %}
          -e "{{   extra_var }}"
          {%-   endfor %}
          {%- endif %}
          -e "@{{ ansible_user_dir }}/ci-framework-data/artifacts/parameters/zuul-params.yml"
