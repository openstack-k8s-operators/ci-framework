- name: Check if the input variables exist
  ansible.builtin.stat:
    path: '{{ cifmw_ceph_client_vars }}'
  register: ceph_input_vars
  when: cifmw_ceph_client_vars is defined

- name: Load variables produced by the cephadm provisioning process
  ansible.builtin.include_vars: '{{ cifmw_ceph_client_vars }}'
  when:
    - cifmw_ceph_client_vars is defined
    - ceph_input_vars.stat.exists | bool

- name: Render keys provided for the Ceph cluster
  ansible.builtin.include_tasks: create_keys.yml
  when:
    - (cifmw_ceph_client_keys is defined) or (keys is defined)
  vars:
    ceph_keys: |
      {% if cifmw_ceph_client_keys | length > 0 %}
      {% set client_keys = cifmw_ceph_client_keys %}
      {% elif keys is defined and keys is mapping %}
      {% set client_keys = keys.get('keys', {}) %}
      {% else %}
      {% set client_keys = keys %}
      {% endif %}
      {{ client_keys }}

- name: Render ceph config for the Ceph Clients
  ansible.builtin.include_tasks: create_ceph_conf.yml
  vars:
    config_overrides: |
      {% if cifmw_ceph_client_config_overrides is defined and cifmw_ceph_client_config_overrides | length > 0 %}
      {% set overrides = cifmw_ceph_client_config_overrides %}
      {% elif ceph_overrides is defined %}
      {% set overrides = ceph_overrides.get('ceph_conf_overrides', {}) %}
      {% else %}
      {% set overrides = {} %}
      {% endif %}
      {{ overrides }}

- name: Base64 encode ceph.conf file
  tags: k8s
  ansible.builtin.slurp:
    src: "{{ cifmw_ceph_client_fetch_dir }}/{{ cifmw_ceph_client_cluster | default('ceph') }}.conf"
  register: cifmw_ceph_client_conf_file_b64
  delegate_to: localhost
  no_log: true

- name: Base64 encode cephx key file
  tags: k8s
  ansible.builtin.slurp:
    src: "{{ cifmw_ceph_client_fetch_dir }}/{{ cifmw_ceph_client_cluster | default('ceph') }}.client.openstack.keyring"
  register: cifmw_ceph_client_key_file_b64
  delegate_to: localhost
  no_log: true
- name: Create k8s_ceph_secret.yml with base64 encoded files
  tags: k8s
  ansible.builtin.template:
    src: templates/k8s_ceph_secret.yml.j2
    dest: "{{ cifmw_ceph_client_fetch_dir }}/k8s_ceph_secret.yml"
    mode: "0600"
    force: true

- name: Load vars from ceph admin role
  ansible.builtin.include_vars: ../../cifmw_cephadm/defaults/main.yml

- name: List Ceph daemon instances on this host
  ansible.builtin.command:
    cmd: "{{ cifmw_cephadm_bin }} ls --no-detail"
  register: cephadm_ls
  become: true

- name: Ensure cifmw_cephadm_fsid variable is set if none was provided
  block:
    - name: Set list of found FSIDs
      when:
        - cephadm_ls is defined
        - cephadm_ls.stdout is defined
        - cephadm_ls.stdout != '[]'
      ansible.builtin.set_fact:
        cifmw_cephadm_fsid_list: |-
          {{
            cephadm_ls.stdout |
            from_json |
            map(attribute='fsid') |
            sort | unique
          }}
    - name: Fail if >1 FSID was discovered
      when: cifmw_cephadm_fsid_list | length > 1
      ansible.builtin.fail:
        msg: |
          Multiple FSIDs were found. This Ansible role does not
          support management of multiple Ceph clusters on one host.

    - name: Set FSID to the discovered value
      when: cifmw_cephadm_fsid_list | length == 1
      ansible.builtin.set_fact:
        cifmw_cephadm_fsid: "{{ cifmw_cephadm_fsid_list[0] }}"

- name: Import Ceph cli task
  ansible.builtin.include_role:
    name: cifmw_cephadm
    tasks_from: ../../cifmw_cephadm/tasks/ceph_cli.yml
  vars:
    ceph_command: radosgw-admin

- name: Check if Ceph S3 glance user exists
  ignore_errors: true
  become: true
  ansible.builtin.command:
    cmd: >-
      {{ cifmw_cephadm_ceph_cli }} user info --uid glance
  register: cifmw_ceph_s3_glance

- name: Create S3 secrets for glance user
  when: cifmw_ceph_s3_user.rc > 0
  become: true
  ansible.builtin.command:
    cmd: >-
      {{ cifmw_cephadm_ceph_cli }} user create --uid="glance" --display-name "glance"

- name: Get S3 user user info
  ansible.builtin.command:
    cmd: >-
      radosgw-admin user info --uid="user"
  register: rgw_user_info
  no_log: true

- name: Import Ceph cli task
  ansible.builtin.include_role:
    name: cifmw_cephadm
    tasks_from: ceph_cli.yml
  vars:
    ceph_command: ceph

- name: Get ceph RGW endpoint API endpoint
  ansible.builtin.command: >-
    {{ cifmw_cephadm_ceph_cli }} config get client.rgw.rgw rgw_keystone_url
  register: reg_ceph_rgw_s3_endpoint
  changed_when: "'stdout' in reg_ceph_rgw_s3_endpoint"
  failed_when: (reg_ceph_rgw_s3_endpoint.rc | int) >= 1

- name: Create S3 Ceph facts
  ansible.builtin.set_fact:
    ceph_s3_access_key: "{{ (rgw_user_info.stdout | from_json).keys[0].access_key }}"
    ceph_s3_secret_key: "{{ (rgw_user_info.stdout | from_json).keys[0].secret_key }}"
    ceph_s3_bucket: "{{ cifmw_ceph_client_rgw_bucket_name }}"
    ceph_s3_endpoint: "{{ reg_ceph_rgw_s3_endpoint.stdout }}"
  no_log: true

- name: Create glance secrets for ceph S3 backend
  ansible.builtin.template:
    src: templates/k8s_ceph_rgw_glance_secret.j2
    dest: "{{ cifmw_ceph_client_fetch_dir }}/k8s_ceph_rgw_glance_secret.yaml"
    mode: "0600"
    force: true
  no_log: true

- name: Create glance S3 secrets
  kubernetes.core.k8s:
    kubeconfig: "{{ cifmw_openshift_kubeconfig }}"
    api_key: "{{ _auth_results.openshift_auth.api_key }}"
    context: "{{ cifmw_openshift_context | default(omit) }}"
    state: present
    apply: true
    src: "{{ cifmw_ceph_client_fetch_dir }}/k8s_ceph_rgw_glance_secret.yaml"
  register: k8s_glance_s3_secret_cleanup
  no_log: true

- name: Delete the rendered secret file if cleanup enabled
  ansible.builtin.file:
    path: "{{ cifmw_ceph_client_fetch_dir }}/k8s_ceph_rgw_glance_secret.yaml"
    state: absent
  when: k8s_glance_s3_secret_cleanup | default(true)

- name: Create edpm-values-post-ceph ConfigMap if sample path provided
  ansible.builtin.include_tasks: edpm_values_post_ceph.yml
  when:
    - cifmw_ceph_client_values_post_ceph_path_src is defined
    - cifmw_ceph_client_values_post_ceph_path_src | length > 0

- name: Create edpm-service-values-post-ceph ConfigMap if sample path provided
  ansible.builtin.include_tasks: edpm_service_values_post_ceph.yml
  when:
    - cifmw_ceph_client_service_values_post_ceph_path_src is defined
    - cifmw_ceph_client_service_values_post_ceph_path_src | length > 0
