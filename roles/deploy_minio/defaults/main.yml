# All variable definitions in this file use the cifmw_deploy_minio_ prefix.
# For ci-framework plays, group_vars/all.yml sets cifmw_deploy_minio_parent_dir
# to {{ cifmw_basedir }}. The value below is the fallback when group_vars is not loaded.

cifmw_deploy_minio: true
cifmw_deploy_minio_parent_dir: "{{ ansible_user_dir }}/ci-framework-data"
cifmw_deploy_minio_base_dir: "{{ cifmw_deploy_minio_parent_dir }}"
cifmw_deploy_minio_manifest_dest: >-
  {{
    [
      cifmw_deploy_minio_base_dir,
      'artifacts',
      'manifests',
      'deploy_minio.yaml'
    ] | path_join
  }}

cifmw_deploy_minio_namespace: minio-dev
cifmw_deploy_minio_image: quay.io/minio/minio:latest
cifmw_deploy_minio_pvc_storage: 10Gi
cifmw_deploy_minio_storage_class: lvms-local-storage
# If empty, OpenShift assigns hosts for the routes.
cifmw_deploy_minio_route_console_host: ""
cifmw_deploy_minio_route_api_host: ""

cifmw_deploy_minio_root_user: minio
cifmw_deploy_minio_root_password: minio123

# Bucket names to pre-create under the MinIO data path (filesystem mode: one
# directory per bucket). Use [] for none.
cifmw_deploy_minio_buckets:
  - loki
