- name: Install lvm2 for thin-pool operations
  become: true
  ansible.builtin.dnf:
    name:
      - lvm2
      - jq
    state: present

- name: Create thin LV from existing thin pool
  become: true
  ansible.builtin.command:
    cmd: >-
      lvcreate -V {{ cifmw_block_device_thin_lv_size }}
      --thin -n {{ cifmw_block_device_thin_lv_name }}
      {{ cifmw_block_device_thin_pool }}
    creates: "/dev/{{ cifmw_block_device_thin_pool.split('/')[0] }}/{{ cifmw_block_device_thin_lv_name }}"
  register: _thin_lvcreate_result
  failed_when:
    - _thin_lvcreate_result.rc != 0
    - "'already exists' not in (_thin_lvcreate_result.stderr | default(''))"

- name: Collect created device path
  ansible.builtin.set_fact:
    cifmw_block_device_paths: >-
      {{ (cifmw_block_device_paths | default([])) +
         ['/dev/' ~ cifmw_block_device_thin_pool.split('/')[0] ~ '/' ~ cifmw_block_device_thin_lv_name] }}
