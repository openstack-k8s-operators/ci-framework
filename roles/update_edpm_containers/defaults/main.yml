# OpenShift namespace where EDPM resources are deployed
cifmw_uec_namespace: "openstack"

# NodeSet selector - can be a specific name or 'all' for all nodesets
cifmw_uec_nodeset_name: "all"

# Image registry URL (auto-detected if empty)
cifmw_uec_image_registry: ""

# Mapping of control plane image keys to EDPM ansible variables
# Only ovnControllerImage is used on EDPM compute nodes
cifmw_uec_image_variable_mapping:
  ovnControllerImage: edpm_ovn_controller_agent_image

# Enable/disable the role
cifmw_update_edpm_containers: true

# Dry run - show changes without applying
cifmw_uec_dry_run: false

# Automatically create OpenStackDataPlaneDeployment after updating NodeSets
cifmw_uec_auto_deploy: true

# Services to run in the deployment to update container images
# For OVN updates, we only need to run the ovn service which will
# pull the updated image and restart the containers
cifmw_uec_deployment_services:
  - configure-network
  - ovn

# Repository configuration for host package updates
# Leave empty to not configure repository
cifmw_uec_repo_name: "custom-updates"
cifmw_uec_repo_baseurl: ""  # Set this to enable host package updates

# Packages to update on the host (not in containers)
# Typically openvswitch and related packages
cifmw_uec_packages_to_update:
  - openvswitch3.3
  - openvswitch-selinux-extra-policy

# Internal variables (do not override)
_cifmw_uec_updated_images: {}
_cifmw_uec_nodesets: []
_cifmw_uec_updated_nodesets: []
