- name: Display update summary
  ansible.builtin.debug:
    msg:
      - "=============================================="
      - "EDPM Container Update Summary"
      - "=============================================="
      - "Updated {{ _cifmw_uec_updated_nodesets | length }} NodeSet(s):"
      - "{{ _cifmw_uec_updated_nodesets }}"
      - ""
      - "Custom images applied:"
      - "{{ _cifmw_uec_updated_images.keys() | list }}"
      - ""
      - "Host package updates:"
      - "{{ 'Enabled - OpenStackDataPlaneService created' if (cifmw_uec_repo_baseurl | default('') | length > 0) else 'Disabled' }}"
      - "{{ 'Repository: ' + cifmw_uec_repo_baseurl if (cifmw_uec_repo_baseurl | default('') | length > 0) else '' }}"
      - "{{ 'Packages: ' + (cifmw_uec_packages_to_update | join(', ')) if (cifmw_uec_repo_baseurl | default('') | length > 0) else '' }}"
      - ""
      - "Next steps:"
      - "1. Verify the NodeSets were updated:"
      - "   oc get openstackdataplanenodeset -n {{ cifmw_uec_namespace }}"
      - ""
      - "2. Create a deployment to apply the changes:"
      - "   ./scripts/update_edpm_containers.sh --nodeset <nodeset-name> \\"
      - "     --services download-cache,update-host-packages,ovn,neutron-metadata,nova"
      - ""
      - "   Or manually create an OpenStackDataPlaneDeployment"
      - ""
      - "3. Monitor the deployment:"
      - "   oc get openstackdataplanedeployment -n {{ cifmw_uec_namespace }} -w"
      - "=============================================="
  when: not cifmw_uec_dry_run

- name: Display dry-run summary
  ansible.builtin.debug:
    msg:
      - "=============================================="
      - "EDPM Container Update Summary (DRY RUN)"
      - "=============================================="
      - "Would update {{ _cifmw_uec_nodesets | length }} NodeSet(s):"
      - "{{ _cifmw_uec_nodesets | map(attribute='metadata.name') | list }}"
      - ""
      - "Custom images to apply:"
      - "{{ _cifmw_uec_updated_images.keys() | list }}"
      - ""
      - "To apply these changes, run without --dry-run"
      - "=============================================="
  when: cifmw_uec_dry_run
