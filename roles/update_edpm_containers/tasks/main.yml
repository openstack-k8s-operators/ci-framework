- name: Early playbook stop if disabled
  when:
    - not cifmw_update_edpm_containers | default(true) | bool
  ansible.builtin.meta: end_play

- name: Validate required variables
  ansible.builtin.assert:
    that:
      - cifmw_uec_namespace is defined
      - cifmw_uec_namespace | length > 0
    fail_msg: "cifmw_uec_namespace must be defined"

- name: Check if oc command is available
  ansible.builtin.command: which oc
  register: _cifmw_uec_oc_check
  failed_when: false
  changed_when: false

- name: Fail if oc is not available
  ansible.builtin.fail:
    msg: "OpenShift CLI (oc) is not available. Please install it and ensure it's in your PATH."
  when: _cifmw_uec_oc_check.rc != 0

- name: Fetch updated container images from OpenStackVersion CR
  ansible.builtin.include_tasks: fetch_updated_images.yml
  when: cifmw_upic_update_edpm_images | default(true) | bool

- name: Fetch EDPM NodeSets
  ansible.builtin.include_tasks: fetch_nodesets.yml
  when: cifmw_upic_update_edpm_images | default(true) | bool

- name: Update NodeSets with custom images
  ansible.builtin.include_tasks: update_nodesets.yml
  when: cifmw_upic_update_edpm_images | default(true) | bool

- name: Create OpenStackDataPlaneService for host package updates
  ansible.builtin.include_tasks: create_update_service.yml
  when: cifmw_upic_update_edpm_host_packages | default(true) | bool

- name: Deploy updates to EDPM nodes
  ansible.builtin.include_tasks: deploy_updates.yml
  when: cifmw_upic_update_edpm_images | default(true) | bool

- name: Display summary
  ansible.builtin.include_tasks: summary.yml
