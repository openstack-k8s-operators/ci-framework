- name: Get all OpenStackDataPlaneNodeSets
  ansible.builtin.command: >-
    oc get openstackdataplanenodeset
    -n {{ cifmw_uec_namespace }}
    -o json
  register: _cifmw_uec_nodesets_result
  changed_when: false
  when: cifmw_uec_nodeset_name == "all"

- name: Get specific OpenStackDataPlaneNodeSet
  ansible.builtin.command: >-
    oc get openstackdataplanenodeset {{ cifmw_uec_nodeset_name }}
    -n {{ cifmw_uec_namespace }}
    -o json
  register: _cifmw_uec_single_nodeset_result
  changed_when: false
  when: cifmw_uec_nodeset_name != "all"

- name: Parse all NodeSets
  ansible.builtin.set_fact:
    _cifmw_uec_nodesets: "{{ (_cifmw_uec_nodesets_result.stdout | from_json)['items'] }}"
  when: cifmw_uec_nodeset_name == "all"

- name: Parse single NodeSet
  ansible.builtin.set_fact:
    _cifmw_uec_nodesets: ["{{ _cifmw_uec_single_nodeset_result.stdout | from_json }}"]
  when: cifmw_uec_nodeset_name != "all"

- name: Display NodeSets found
  ansible.builtin.debug:
    msg:
      - "Found {{ _cifmw_uec_nodesets | length }} OpenStackDataPlaneNodeSet(s)"
      - "NodeSets: {{ _cifmw_uec_nodesets | map(attribute='metadata.name') | list }}"

- name: Fail if no NodeSets found
  ansible.builtin.fail:
    msg: "No OpenStackDataPlaneNodeSets found in namespace {{ cifmw_uec_namespace }}"
  when: _cifmw_uec_nodesets | length == 0
