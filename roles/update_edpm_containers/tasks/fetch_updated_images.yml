- name: Get OpenStackVersion CR
  ansible.builtin.command: >-
    oc get openstackversion
    -n {{ cifmw_uec_namespace }}
    -o json
  register: _cifmw_uec_osv_list_result
  changed_when: false

- name: Parse OpenStackVersion CRs JSON
  ansible.builtin.set_fact:
    _cifmw_uec_osv_json: "{{ _cifmw_uec_osv_list_result.stdout | from_json }}"

- name: Extract items list from OpenStackVersion CRs
  ansible.builtin.set_fact:
    _cifmw_uec_osv_list: "{{ _cifmw_uec_osv_json['items'] }}"

- name: Get first OpenStackVersion CR name
  ansible.builtin.set_fact:
    _cifmw_uec_osv_name: "{{ _cifmw_uec_osv_list[0].metadata.name }}"
  when: _cifmw_uec_osv_list | length > 0

- name: Fail if no OpenStackVersion CR found
  ansible.builtin.fail:
    msg: "No OpenStackVersion CR found in namespace {{ cifmw_uec_namespace }}"
  when: _cifmw_uec_osv_list | length == 0

- name: Get OpenStackVersion CR details
  ansible.builtin.command: >-
    oc get openstackversion {{ _cifmw_uec_osv_name }}
    -n {{ cifmw_uec_namespace }}
    -o json
  register: _cifmw_uec_osv_result
  changed_when: false

- name: Parse custom container images from CR
  ansible.builtin.set_fact:
    _cifmw_uec_custom_images: "{{ (_cifmw_uec_osv_result.stdout | from_json).spec.customContainerImages | default({}) }}"

- name: Display found custom images
  ansible.builtin.debug:
    msg:
      - "Found {{ _cifmw_uec_custom_images | length }} custom container images in OpenStackVersion CR"
      - "Custom images: {{ _cifmw_uec_custom_images.keys() }}"

- name: Filter EDPM-relevant images
  ansible.builtin.set_fact:
    _cifmw_uec_updated_images: >-
      {{
        _cifmw_uec_custom_images | dict2items |
        selectattr('key', 'in', cifmw_uec_image_variable_mapping.keys()) |
        items2dict
      }}

- name: Display EDPM-relevant images
  ansible.builtin.debug:
    msg:
      - "Found {{ _cifmw_uec_updated_images | length }} EDPM-relevant custom images"
      - "Images: {{ _cifmw_uec_updated_images.keys() }}"

- name: Warn if no EDPM images found
  ansible.builtin.debug:
    msg: "WARNING: No EDPM-relevant custom images found. NodeSets will not be updated."
  when: _cifmw_uec_updated_images | length == 0
