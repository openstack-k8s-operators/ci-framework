- name: Ensure the current image dict entry has the expected schema
  vars:
    _expected_keys_sorted: "{{ ['base_url', 'images_file', 'qcow_prefix'] }}"
    _given_keys_sorted: >-
      {{
        (_current_image.value.keys() | list | sort)
        if _current_image.value is mapping
        else []
      }}
  ansible.builtin.assert:
    that:
      - _given_keys_sorted == _expected_keys_sorted
    fail_msg: >-
      The image discovery request dict's {{ _current_image.key }} entry
      does not match the expected schema. Expected the following keys:
      {{ _expected_keys_sorted }}, but got: {{ _given_keys_sorted }}. See the
      discover_latest_image role's README for more information.

- name: Get latest image for the current entry
  register: discovered_image
  cifmw.general.discover_latest_image:
    url: "{{ _current_image.value.base_url }}"
    image_prefix: "{{ _current_image.value.qcow_prefix }}"
    images_file: "{{ _current_image.value.images_file }}"

- name: Append the current return value to the discovered images dict
  ansible.builtin.set_fact:
    cifmw_discovered_images_dict: >-
      {{ cifmw_discovered_images_dict |
      combine({_current_image.key: discovered_image.data}) }}
    cacheable: true
