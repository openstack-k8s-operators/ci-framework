---
# OpenShift/Kubernetes namespace for EDPM resources
edpm_ssh_info_openstack_namespace: openstack

# Kubeconfig file path
edpm_ssh_info_kubeconfig_path: "{{ ansible_user_dir }}/.kube/config"

# OpenShift authentication required
edpm_ssh_info_oc_auth_required: true

# OpenShift login credentials
edpm_ssh_info_oc_username: kubeadmin
edpm_ssh_info_oc_password_file: "{{ ansible_user_dir }}/.kube/kubeadmin-password"
edpm_ssh_info_oc_api_url: https://api.ocp.openstack.lab:6443/

# Node name prefix to filter (e.g., 'compute-', 'networker-')
edpm_ssh_info_node_prefix: compute-

# SSH private key retrieval settings
edpm_ssh_info_ssh_secret_name: dataplane-ansible-ssh-private-key-secret
edpm_ssh_info_ssh_key_path: "{{ ansible_user_dir }}/.ssh/compute_id"
