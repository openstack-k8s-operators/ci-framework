---
# Default Rally task for CI Framework.
# Authenticates against Keystone to validate the OpenStack connection.
# Override by setting cifmw_rally_task_file to a different filename and
# pre-staging that file in cifmw_rally_artifacts_basedir/tasks/ via a pre-hook.
version: 2
title: "CI Framework default Rally smoke task"
description: >
  Keystone authentication benchmark.
  Validates Rally can reach and authenticate to OpenStack. No cloud resources required.

subtasks:
  - title: "Authenticate to Keystone"
    scenario:
      Authenticate.keystone: {}
    runner:
      constant:
        times: {{ concurrency | default(1) }}
        concurrency: {{ concurrency | default(1) }}
    contexts:
      users:
        tenants: 1
        users_per_tenant: 1
    sla:
      failure_rate:
        max: 0
