---
# Cinder volume benchmarks for ci-framework Rally integration.
# Requires a working Cinder backend (e.g. LVM iSCSI in uni01alpha).
version: 2
title: "CI Framework Cinder Rally task"
description: >
  Basic Cinder volume operations benchmark.
  Validates create/delete, create/list, create/update, and clone workflows.

subtasks:
  - title: "Create and delete volume"
    scenario:
      CinderVolumes.create_and_delete_volume:
        size: 1
    runner:
      constant:
        times: 1
        concurrency: {{ concurrency | default(1) }}
    contexts:
      users:
        tenants: 1
        users_per_tenant: 1
    sla:
      failure_rate:
        max: 0

  - title: "Create and list volume"
    scenario:
      CinderVolumes.create_and_list_volume:
        size: 1
    runner:
      constant:
        times: 1
        concurrency: {{ concurrency | default(1) }}
    contexts:
      users:
        tenants: 1
        users_per_tenant: 1
    sla:
      failure_rate:
        max: 0

  - title: "Create and update volume"
    scenario:
      CinderVolumes.create_and_update_volume:
        size: 1
    runner:
      constant:
        times: 1
        concurrency: {{ concurrency | default(1) }}
    contexts:
      users:
        tenants: 1
        users_per_tenant: 1
    sla:
      failure_rate:
        max: 0

  - title: "Create volume and clone it"
    scenario:
      CinderVolumes.create_volume_and_clone_it:
        size: 1
    runner:
      constant:
        times: 1
        concurrency: {{ concurrency | default(1) }}
    contexts:
      users:
        tenants: 1
        users_per_tenant: 1
    sla:
      failure_rate:
        max: 0
