---
- name: Cleanup mock iDRAC server
  hosts: all
  gather_facts: false
  ignore_unreachable: true
  vars:
    _mock_dir: /tmp/mock_idrac
    _mock_port: 8443
  tasks:
    - name: Stop mock iDRAC server
      ansible.builtin.shell:
        cmd: "pkill -f '[m]ock_idrac.py.*--port {{ _mock_port }}' || true"
      changed_when: false
      failed_when: false

    - name: Show mock server log
      ansible.builtin.command:
        cmd: "cat {{ _mock_dir }}/mock_idrac.log"
      register: _mock_log
      changed_when: false
      failed_when: false

    - name: Print mock server log
      ansible.builtin.debug:
        var: _mock_log.stdout_lines
      when:
        - _mock_log is not unreachable
        - _mock_log.stdout_lines | default([]) | length > 0
