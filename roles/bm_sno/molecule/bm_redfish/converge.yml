---
- name: Converge -- test bm_* Redfish tasks against mock iDRAC
  hosts: instance
  gather_facts: false
  vars_files:
    - vars/common.yml
  tasks:
    - name: Test bm_power_off
      ansible.builtin.include_tasks:
        file: tasks/test_power_off.yml

    - name: Test bm_power_on
      ansible.builtin.include_tasks:
        file: tasks/test_power_on.yml

    - name: Test bm_check_usb_boot
      ansible.builtin.include_tasks:
        file: tasks/test_check_usb_boot.yml

    - name: Test bm_ensure_usb_boot
      ansible.builtin.include_tasks:
        file: tasks/test_ensure_usb_boot.yml

    - name: Test bm_eject_vmedia
      ansible.builtin.include_tasks:
        file: tasks/test_eject_vmedia.yml

    - name: Test bm_discover_vmedia_target
      ansible.builtin.include_tasks:
        file: tasks/test_discover_vmedia.yml
