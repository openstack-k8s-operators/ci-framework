---
# Enusre power off the bare metal host.
# Requires: _bmc_host, _bmc_creds, _redfish_headers
- name: Query current power state
  no_log: true
  ansible.builtin.uri:
    url: "https://{{ _bmc_host }}/redfish/v1/Systems/System.Embedded.1"
    method: GET
    headers: "{{ _redfish_headers }}"
    user: "{{ _bmc_creds.username }}"
    password: "{{ _bmc_creds.password }}"
    validate_certs: false
    force_basic_auth: true
    status_code: [200]
  register: _power_state_check

- name: Force power off via Redfish
  when: _power_state_check.json.PowerState != 'Off'
  no_log: true
  ansible.builtin.uri:
    url: "https://{{ _bmc_host }}/redfish/v1/Systems/System.Embedded.1/Actions/ComputerSystem.Reset"
    method: POST
    headers: "{{ _redfish_headers }}"
    body_format: json
    body:
      ResetType: ForceOff
    user: "{{ _bmc_creds.username }}"
    password: "{{ _bmc_creds.password }}"
    validate_certs: false
    force_basic_auth: true
    status_code: [200, 204]

- name: Wait for host to power off
  when: _power_state_check.json.PowerState != 'Off'
  no_log: true
  ansible.builtin.uri:
    url: "https://{{ _bmc_host }}/redfish/v1/Systems/System.Embedded.1"
    method: GET
    headers: "{{ _redfish_headers }}"
    user: "{{ _bmc_creds.username }}"
    password: "{{ _bmc_creds.password }}"
    validate_certs: false
    force_basic_auth: true
    status_code: [200]
  register: _power_off_wait
  retries: 12
  delay: 10
  until: _power_off_wait.json.PowerState == 'Off'
