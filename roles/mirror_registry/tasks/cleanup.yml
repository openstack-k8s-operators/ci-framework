- name: Cleaning the World
  ansible.builtin.debug:
    msg: "So here mirror-registry should clean things up!"

- name: Uninstall mirror-registry
  become: true
  ansible.builtin.shell: |
    echo y | {{ cifw_mirror_registry_base_dir }}/mirror-registry uninstall -v
  register: install_output

- name: Add hosts entry in /etc/hosts for mirror-registry
  become: true
  ansible.builtin.lineinfile:
    dest: /etc/hosts
    line: "127.0.0.1 {{ cifw_mirror_registry_fqdn }}"
    state: absent

- name: Make directory for mirror-registry to use
  become: true
  ansible.builtin.file:
     path: "{{ cifw_mirror_registry_base_dir }}/registry"
     owner: "{{ ansible_user | default(lookup('env', 'USER')) }}"
     group: "{{ ansible_user | default(lookup('env', 'USER')) }}"
     state: absent
     recurse: true
