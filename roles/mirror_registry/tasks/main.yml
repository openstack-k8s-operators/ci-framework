- name: Set random auth cred for duration of QE run
  ansible.builtin.set_fact:
    # For QE purposes, this only needs to exist for the duration of a single execution.
    # Randomly generating a string saves us from pulling the randomly generated init password
    # from the stdout of mirror-registry install.
    cifw_mirror_registry_init_password: "{{ lookup('community.general.random_string', length=12, special=false) }}"

- name: Make directory for mirror-registry to use
  become: true
  ansible.builtin.file:
     path: "{{ cifw_mirror_registry_base_dir }}/registry"
     owner: "{{ ansible_user | default(lookup('env', 'USER')) }}"
     group: "{{ ansible_user | default(lookup('env', 'USER')) }}"
     state: directory

- name: Download mirror-registry tools
  ansible.builtin.get_url:
     url: "https://github.com/quay/mirror-registry/releases/download/{{ cifw_mirror_registry_release_version }}/mirror-registry-online.tar.gz"
     dest: "{{ cifw_mirror_registry_base_dir }}"

- name: Untar mirror-registry tools
  ansible.builtin.unarchive:
    src: "{{ cifw_mirror_registry_base_dir }}/mirror-registry-online.tar.gz"
    dest: "{{ cifw_mirror_registry_base_dir }}"

- name: Add hosts entry in /etc/hosts for mirror-registry
  become: true
  ansible.builtin.lineinfile:
    dest: /etc/hosts
    line: "127.0.0.1 {{ cifw_mirror_registry_fqdn }}"
    state: present

- name: Install mirror-registry
  become: true
  ansible.builtin.shell: |
    {{ cifw_mirror_registry_base_dir }}/mirror-registry install -v --quayHostname {{ cifw_mirror_registry_fqdn }} --quayRoot {{ cifw_mirror_registry_base_dir }}/registry --initPassword {{ cifw_mirror_registry_init_password }}
  register: install_output
