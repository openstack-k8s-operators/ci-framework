---
- name: Converge
  hosts: all
  gather_facts: false

  vars_files:
    - vars.yaml
  vars:
    # Vars required by prepare_overcloud.yml
    cifmw_libvirt_manager_images_path: /tmp/images
    cifmw_libvirt_manager_image_name: centos-stream-9.qcow2
    cifmw_adoption_osp_deploy_repos: []
    cifmw_adoption_source_scenario_path: "."
    cifmw_basedir: "{{ playbook_dir }}"

  tasks:
    - name: Gather stack nodes and facts
      ansible.builtin.include_tasks: ../../tasks/gather_stack_nodes.yml
      loop: "{{ stacks }}"
      loop_control:
        loop_var: _stack

    - name: Store result for verification as persistent fact
      ansible.builtin.set_fact:
        tripleo_nodes_stack: "{{ _tripleo_nodes_stack }}"
        cacheable: true

    - name: Test edpm_nodes template generation for multi-cell
      block:
        - name: Render and parse adoption_vars template
          ansible.builtin.set_fact:
            parsed_adoption_vars: "{{ lookup('template', '../../templates/adoption_vars.yaml.j2') | from_yaml }}"
            cacheable: true
          vars:
            ip_version: ip_v4
    - name: Test stack args override logic
      vars:
        _mock_args:
          - "--override-ansible-cfg /home/zuul/ansible_config.cfg"
          - "--templates /usr/share/openstack-tripleo-heat-templates"
          - "--libvirt-type qemu"
          - "--timeout 90"
          - "--deployed-server"
      block:
        - name: Test default (no remove, no add) preserves args
          ansible.builtin.set_fact:
            _result_default: >-
              {{
                ((_mock_args |
                 reject('in', []) |
                 list) +
                 []) |
                join(' ')
              }}

        - name: Test removing a single arg
          ansible.builtin.set_fact:
            _result_remove: >-
              {{
                ((_mock_args |
                 reject('in', ['--libvirt-type qemu']) |
                 list) +
                 []) |
                join(' ')
              }}

        - name: Test adding an arg
          ansible.builtin.set_fact:
            _result_add: >-
              {{
                ((_mock_args |
                 reject('in', []) |
                 list) +
                 ['--libvirt-type kvm']) |
                join(' ')
              }}

        - name: Test removing and adding (replace pattern)
          ansible.builtin.set_fact:
            _result_replace: >-
              {{
                ((_mock_args |
                 reject('in', ['--libvirt-type qemu']) |
                 list) +
                 ['--libvirt-type kvm']) |
                join(' ')
              }}

        - name: Test removing multiple args
          ansible.builtin.set_fact:
            _result_remove_multi: >-
              {{
                ((_mock_args |
                 reject('in', ['--libvirt-type qemu',
                               '--timeout 90']) |
                 list) +
                 []) |
                join(' ')
              }}

        - name: Test removing non-existent arg is a no-op
          ansible.builtin.set_fact:
            _result_remove_noop: >-
              {{
                ((_mock_args |
                 reject('in', ['--nonexistent-flag']) |
                 list) +
                 []) |
                join(' ')
              }}

        - name: Store args override results for verification
          ansible.builtin.set_fact:
            args_override_results:
              mock_args_joined: "{{ _mock_args | join(' ') }}"
              default: "{{ _result_default }}"
              remove: "{{ _result_remove }}"
              add: "{{ _result_add }}"
              replace: "{{ _result_replace }}"
              remove_multi: "{{ _result_remove_multi }}"
              remove_noop: "{{ _result_remove_noop }}"
            cacheable: true
