- name: Create namespace
  kubernetes.core.k8s:
    name: "{{ cifmw_ipa_namespace }}"
    api_version: v1
    kind: Namespace
    state: present

- name: Get IPA operator deployment config from repository
  ansible.builtin.git:
    dest: "{{ [ ansible_user_dir, 'ci-framework-data', 'tmp', 'freeipa-operator' ] | path_join }}"
    repo: "https://github.com/freeipa/freeipa-operator"
    force: yes

- name: Install IPA operator
  environment:
    KUBECONFIG: "{{ cifmw_openshift_kubeconfig }}"
    PATH: "{{ cifmw_path }}"
  ansible.builtin.shell:
    cmd: |-
      cd "{{ [ ansible_user_dir, 'ci-framework-data', 'tmp', 'freeipa-operator' ] | path_join }}"
      oc create -f config/rbac/scc.yaml
      (cd config/default && kustomize edit set namespace "{{ cifmw_ipa_namespace }}")
      (cd config/manager && kustomize edit set image controller=quay.io/freeipa/freeipa-operator:nightly)
      kustomize build config/default | kubectl apply -f -

- name: Wait for it to be deployed
  kubernetes.core.k8s_info:
    api_version: apps/v1
    kind: Deployment
    name: idm-operator-controller-manager
    namespace: "{{ cifmw_ipa_namespace }}"
    wait: true
    wait_condition:
      type: "Available"
      reason: "MinimumReplicasAvailable"
    wait_timeout: 60

- name: Add IDM admin password secret
  kubernetes.core.k8s:
    kubeconfig: "{{ cifmw_openshift_kubeconfig }}"
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      type: Opaque
      metadata:
        name: idm-secret
        namespace: "{{ cifmw_ipa_namespace }}"
      data:
        IPA_DM_PASSWORD: "{{ cifmw_ipa_admin_password | b64encode }}"
        IPA_ADMIN_PASSWORD: "{{ cifmw_ipa_admin_password | b64encode }}"

- name: Read IPA instance template
  ansible.builtin.template:
    src: ipa.yaml.j2
    dest: "{{ [ ansible_user_dir, 'ci-framework-data', 'tmp', 'ipa.yaml' ] | path_join }}"
    mode: "0644"

- name: Install IPA pod
  environment:
    KUBECONFIG: "{{ cifmw_openshift_kubeconfig }}"
    PATH: "{{ cifmw_path }}"
  ansible.builtin.shell:
    cmd: |-
      oc apply -n {{ cifmw_ipa_namespace }} -f {{ [ ansible_user_dir, 'ci-framework-data', 'tmp', 'ipa.yaml' ] | path_join }}

- name: Wait on pod to be ready
  kubernetes.core.k8s_info:
    kind: Pod
    name: idm-main-0
    namespace: "{{ cifmw_ipa_namespace }}"
    wait: true
    wait_timeout: 300

- name: Get ipa route
  kubernetes.core.k8s_info:
    api_version: route.openshift.io/v1
    kind: Route
    name: idm
    namespace: "{{ cifmw_ipa_namespace }}"
  register: idm_route

- name: Wait for IPA pod to be avalable
  ansible.builtin.uri:
    url: "https://{{ idm_route.resources.0.spec.host }}"
    follow_redirects: true
    method: GET
    validate_certs: "{{ cifmw_ipa_url_validate_certs }}"
  register: _result
  until: _result.status == 200
  retries: 48 # wait at least 4 min for the to pod come online then fail
  delay: 5

- name: Ensure IPA LDAP/LDAPS service is exposed
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Service
      metadata:
        name: ipa-directory-service
        namespace: "{{ cifmw_ipa_namespace | default('ipa') }}"
      spec:
        selector:
          app: idm
        ports:
          - name: ldap
            protocol: TCP
            port: 389
            targetPort: 389
          - name: ldaps
            protocol: TCP
            port: 636
            targetPort: 636
