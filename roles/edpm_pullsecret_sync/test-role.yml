---
# Quick test playbook for edpm_pullsecret_sync role
# Run with: ansible-playbook -i localhost, roles/edpm_pullsecret_sync/test-role.yml

- name: Test edpm_pullsecret_sync role
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    # Test with registry.stage.redhat.io
    cifmw_edpm_pullsecret_sync_registry: "registry.stage.redhat.io"
    # Use local kubeconfig
    cifmw_openshift_kubeconfig: "{{ lookup('env', 'HOME') }}/.kube/config"
  tasks:
    - name: Run edpm_pullsecret_sync role
      ansible.builtin.include_role:
        name: edpm_pullsecret_sync

    - name: Display results
      ansible.builtin.debug:
        msg: |
          ===== Extracted Credentials =====
          Registry: {{ cifmw_edpm_pullsecret_credentials.registry }}
          Username: {{ cifmw_edpm_pullsecret_credentials.username }}
          Password (first 50 chars): {{ cifmw_edpm_pullsecret_credentials.password[:50] }}...
          
          ===== Dictionary format for edpm_container_registry_logins =====
          {{ cifmw_edpm_pullsecret_credentials_dict | to_nice_yaml }}
