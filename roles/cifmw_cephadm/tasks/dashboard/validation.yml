- name: Validate connection to dashboard service
  ansible.builtin.command: "curl -k http://{{ grafana_server_addr }}:{{ cifmw_cephadm_dashboard_port }}"
  args:
    warn: false
  register: dashboard_response
  failed_when: dashboard_response.rc != 0

- name: Check http response code from dashboard service
  ansible.builtin.command: "curl -u admin:admin -o /dev/null -s -w %{http_code} http://{{ grafana_server_addr }}:8444"
  args:
    warn: false
  register: dashboard_http_code
  failed_when: dashboard_http_code.stdout != "200"
