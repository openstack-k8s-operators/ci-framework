---
# Main: Generate stackviz HTML reports from tempest subunit results
# This is the main orchestrator that coordinates stackviz report generation
# Included after log collection when tempest tests complete
# Handles multiple test stages by generating separate reports for each
# Calls generate-stackviz-worker.yml for each subunit file found

- name: Find all tempest subunit files (results and retries, compressed or uncompressed)
  ansible.builtin.find:
    paths: "{{ cifmw_test_operator_artifacts_basedir }}"
    patterns:
      - "tempest_results.subunit*"
      - "tempest_retry.subunit*"
    recurse: true
  register: subunit_gz_files

- name: Display found subunit files
  ansible.builtin.debug:
    msg: "Found {{ subunit_gz_files.files | length }} subunit file(s) (results + retries)"

- name: Process stackviz reports
  when: subunit_gz_files.files | length > 0
  block:
    # Dependency checking (done once, not per file)
    - name: Check if Python script exists
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/scripts/generate-stackviz-report.py"
      register: stackviz_script_stat

    - name: Fail if stackviz script not found
      ansible.builtin.fail:
        msg: >
          Stackviz generation script not found at {{ playbook_dir }}/scripts/generate-stackviz-report.py.
          Please ensure the script is available in the ci-framework repository.
      when: not stackviz_script_stat.stat.exists

    - name: Check for python-subunit package
      ansible.builtin.command:
        cmd: python3 -c "import subunit"
      register: subunit_check
      ignore_errors: true
      changed_when: false

    - name: Check for testtools package
      ansible.builtin.command:
        cmd: python3 -c "import testtools"
      register: testtools_check
      ignore_errors: true
      changed_when: false

    - name: Set missing packages fact
      ansible.builtin.set_fact:
        _stackviz_missing_packages: >-
          {{
            ([] +
            (['python-subunit'] if subunit_check.rc != 0 else []) +
            (['testtools'] if testtools_check.rc != 0 else []))
          }}

    - name: Attempt to auto-install missing packages
      when:
        - _stackviz_missing_packages | length > 0
        - cifmw_test_operator_stackviz_auto_install_deps | default(false)
      block:
        - name: Install missing Python packages via pip3
          ansible.builtin.pip:
            name: "{{ _stackviz_missing_packages }}"
            executable: pip3
            state: present
          register: pip_install_result
          ignore_errors: true

        - name: Re-check for python-subunit package after installation
          ansible.builtin.command:
            cmd: python3 -c "import subunit"
          register: subunit_recheck
          ignore_errors: true
          changed_when: false
          when: "'python-subunit' in _stackviz_missing_packages"

        - name: Re-check for testtools package after installation
          ansible.builtin.command:
            cmd: python3 -c "import testtools"
          register: testtools_recheck
          ignore_errors: true
          changed_when: false
          when: "'testtools' in _stackviz_missing_packages"

        - name: Update missing packages fact after installation attempt
          ansible.builtin.set_fact:
            _stackviz_missing_packages: >-
              {{
                ([] +
                (['python-subunit'] if (subunit_recheck is defined and subunit_recheck.rc != 0) or (subunit_check.rc != 0 and 'python-subunit' not in _stackviz_missing_packages) else []) +
                (['testtools'] if (testtools_recheck is defined and testtools_recheck.rc != 0) or (testtools_check.rc != 0 and 'testtools' not in _stackviz_missing_packages) else []))
              }}

        - name: Display auto-install result
          ansible.builtin.debug:
            msg: "Successfully auto-installed Python dependencies for stackviz"
          when:
            - pip_install_result is succeeded
            - _stackviz_missing_packages | length == 0

    - name: Display installation instructions if packages are missing
      ansible.builtin.fail:
        msg: |
          ERROR: Required Python packages are missing for stackviz report generation.

          Missing packages: {{ _stackviz_missing_packages | join(', ') }}

          Please install the missing packages using one of the following methods:

          Using pip:
            pip install {{ _stackviz_missing_packages | join(' ') }}

          Using pip3:
            pip3 install {{ _stackviz_missing_packages | join(' ') }}

          Using system package manager (RHEL/CentOS/Fedora):
            sudo dnf install {% for pkg in _stackviz_missing_packages %}python3-{{ pkg | replace('python-', '') }}{% if not loop.last %} {% endif %}{% endfor %}

          Using system package manager (Ubuntu/Debian):
            sudo apt-get install {% for pkg in _stackviz_missing_packages %}python3-{{ pkg | replace('python-', '') }}{% if not loop.last %} {% endif %}{% endfor %}

          After installing the packages, re-run the playbook.
      when: _stackviz_missing_packages | length > 0

    - name: Display dependency check success
      ansible.builtin.debug:
        msg: "All required Python packages are installed (python-subunit, testtools)"
      when:
        - _stackviz_missing_packages | length == 0
        - cifmw_test_operator_stackviz_debug | default(false)

    # Initialize list to track generated reports
    - name: Initialize stackviz reports list
      ansible.builtin.set_fact:
        _stackviz_generated_reports: []

    # Process each subunit file
    - name: Process each subunit file and generate individual reports
      include_tasks: generate-stackviz-worker.yml
      loop: "{{ subunit_gz_files.files }}"
      loop_control:
        loop_var: subunit_file
        index_var: subunit_index
      when: _stackviz_missing_packages | length == 0

    # Create summary index page
    - name: Create stackviz summary index
      when:
        - _stackviz_generated_reports | length > 0
        - cifmw_test_operator_stackviz_create_index | default(true)
      block:
        - name: Create stackviz directory
          ansible.builtin.file:
            path: "{{ cifmw_test_operator_artifacts_basedir }}/stackviz"
            state: directory
            mode: '0755'

        - name: Generate summary index HTML
          ansible.builtin.template:
            src: stackviz-index.html.j2
            dest: "{{ cifmw_test_operator_artifacts_basedir }}/stackviz/index.html"
            mode: '0644'
          when: false  # Template will be created separately

        - name: Generate simple summary index HTML
          ansible.builtin.copy:
            content: |
              <!DOCTYPE html>
              <html lang="en">
              <head>
                  <meta charset="UTF-8">
                  <meta name="viewport" content="width=device-width, initial-scale=1.0">
                  <title>Tempest Test Reports - Summary</title>
                  <style>
                      body {
                          font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
                          background-color: #0d1117;
                          color: #c9d1d9;
                          margin: 40px;
                          line-height: 1.6;
                      }
                      h1 { color: #58a6ff; margin-bottom: 30px; }
                      h2 { color: #8b949e; margin-top: 30px; }
                      .report-list { list-style: none; padding: 0; }
                      .report-item {
                          background-color: #161b22;
                          border: 1px solid #30363d;
                          border-radius: 6px;
                          padding: 20px;
                          margin-bottom: 15px;
                          transition: background-color 0.2s;
                      }
                      .report-item:hover { background-color: #1c2128; }
                      .report-link {
                          color: #58a6ff;
                          text-decoration: none;
                          font-size: 18px;
                          font-weight: bold;
                      }
                      .report-link:hover { text-decoration: underline; }
                      .report-path {
                          color: #8b949e;
                          font-size: 14px;
                          margin-top: 5px;
                          font-family: monospace;
                      }
                      .report-count {
                          color: #7ee787;
                          font-size: 24px;
                          font-weight: bold;
                      }
                      .timestamp {
                          color: #8b949e;
                          font-size: 12px;
                          margin-top: 20px;
                      }
                      .badge {
                          padding: 2px 6px;
                          border-radius: 3px;
                          font-size: 10px;
                          margin-right: 8px;
                          font-weight: bold;
                      }
                      .retry-badge {
                          background-color: #9e6a03;
                          color: white;
                      }
                  </style>
              </head>
              <body>
                  <h1>Tempest Test Reports</h1>
                  <p>Total Reports Generated: <span class="report-count">{{ _stackviz_generated_reports | length }}</span></p>

                  <h2>Individual Test Stage Reports</h2>
                  <ul class="report-list">
              {% for report in _stackviz_generated_reports %}
                      <li class="report-item">
                          <a href="{{ report.html_path | relpath(cifmw_test_operator_artifacts_basedir ~ '/stackviz') }}" class="report-link">
                              {% if report.is_retry %}
                              <span class="badge retry-badge">RETRY</span>
                              {% endif %}
                              {{ report.stage_name }}
                          </a>
                          <div class="report-path">{{ report.html_path }}</div>
                      </li>
              {% endfor %}
                  </ul>

                  <div class="timestamp">
                      Generated: {{ ansible_date_time.iso8601 }}
                  </div>
              </body>
              </html>
            dest: "{{ cifmw_test_operator_artifacts_basedir }}/stackviz/index.html"
            mode: '0644'

    - name: Display stackviz summary
      ansible.builtin.debug:
        msg: |
          ===================================================
          Stackviz Report Generation Complete!

          Total Reports Generated: {{ _stackviz_generated_reports | length }}

          {% for report in _stackviz_generated_reports %}
          - {{ report.report_label }}
            {{ report.html_path }}
          {% endfor %}

          {% if cifmw_test_operator_stackviz_create_index | default(true) %}
          Summary Index: {{ cifmw_test_operator_artifacts_basedir }}/stackviz/index.html

          To view all reports:
          {% if ansible_os_family == 'Darwin' %}
          open {{ cifmw_test_operator_artifacts_basedir }}/stackviz/index.html
          {% else %}
          xdg-open {{ cifmw_test_operator_artifacts_basedir }}/stackviz/index.html
          {% endif %}
          {% endif %}
          ===================================================
      when: _stackviz_generated_reports | length > 0

- name: Display warning when no subunit files found
  ansible.builtin.debug:
    msg: >
      WARNING: No tempest subunit files (tempest_results.subunit* or tempest_retry.subunit*) found in {{ cifmw_test_operator_artifacts_basedir }}.
      Stackviz report generation skipped.
  when: subunit_gz_files.files | length == 0
