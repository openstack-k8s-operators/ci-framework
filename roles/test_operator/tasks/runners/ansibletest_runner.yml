    _test_operator_ansibletest_ansible_collection: "{{ _stage_test_vars.cifmw_test_operator_ansibletest_ansible_collection | default(cifmw_test_operator_ansibletest_ansible_collection) }}"
    _test_operator_ansibletest_ansible_var_files: "{{ _stage_test_vars.cifmw_test_operator_ansibletest_ansible_var_files | default(cifmw_test_operator_ansibletest_ansible_var_files) }}"
    _test_operator_ansibletest_ansible_extra_vars: "{{ _stage_test_vars.cifmw_test_operator_ansibletest_ansible_extra_vars | default(cifmw_test_operator_ansibletest_ansible_extra_vars) }}"
