---
- name: Run ansibletest job
  vars:
    _test_operator_ansibletest_registry: "{{ _stage_test_vars.cifmw_test_operator_ansibletest_registry | default(cifmw_test_operator_ansibletest_registry) }}"
    _test_operator_ansibletest_namespace: "{{ _stage_test_vars.cifmw_test_operator_ansibletest_namespace | default(cifmw_test_operator_ansibletest_namespace) }}"
    _test_operator_ansibletest_container: "{{ _stage_test_vars.cifmw_test_operator_ansibletest_container | default(cifmw_test_operator_ansibletest_container) }}"
    _test_operator_ansibletest_image: "{{ _stage_test_vars.cifmw_test_operator_ansibletest_image | default(cifmw_test_operator_ansibletest_image) }}"
    _test_operator_ansibletest_image_tag: "{{ _stage_test_vars.cifmw_test_operator_ansibletest_image_tag | default(cifmw_test_operator_ansibletest_image_tag) }}"
    _test_operator_ansibletest_compute_ssh_key_secret_name: "{{ _stage_test_vars.cifmw_test_operator_ansibletest_compute_ssh_key_secret_name | default(cifmw_test_operator_ansibletest_compute_ssh_key_secret_name) }}"
