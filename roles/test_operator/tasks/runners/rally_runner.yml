- name: Run rally tests
  vars:
    cifmw_rally_task_file: >-
      {{ _stage_test_vars.cifmw_test_operator_rally_task_file
         | default(stage_vars_dict.cifmw_test_operator_rally_task_file
         | default(cifmw_rally_task_file)) }}
    cifmw_rally_concurrency: >-
      {{ _stage_test_vars.cifmw_test_operator_rally_concurrency
         | default(stage_vars_dict.cifmw_test_operator_rally_concurrency
         | default(cifmw_rally_concurrency)) }}
    cifmw_rally_fail_on_task_failure: >-
      {{ _stage_test_vars.cifmw_test_operator_rally_fail_on_task_failure
         | default(stage_vars_dict.cifmw_test_operator_rally_fail_on_task_failure
         | default(cifmw_rally_fail_on_task_failure)) }}
    cifmw_rally_task_extra_args: >-
      {{ _stage_test_vars.cifmw_test_operator_rally_task_extra_args
         | default(stage_vars_dict.cifmw_test_operator_rally_task_extra_args
         | default(cifmw_rally_task_extra_args)) }}
  ansible.builtin.include_role:
    name: rally
