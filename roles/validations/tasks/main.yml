# Create data collection directories
- name: Ensure directories exist
  ansible.builtin.file:
    path: "{{ cifmw_validations_basedir }}/{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - artifacts
    - logs

- name: Initialize variables needed for generating polarion xml file
  ansible.builtin.set_fact:
    validations_executed: 0
    validations_failed: 0
    validations_errors: 0
    xml_line_list: []

- name: Get validations start time from system
  ansible.builtin.command:
    cmd: date +%Y-%m-%d-%H:%M:%S.%3N
  register: validations_start_time

# We can execute all defined validations when cifmw_validation_run_all is defined.
# Else, we will skip this and run only the explicitly defined validations from
# cifmw_validations_list
- name: Run all validations if required
  when: cifmw_validations_run_all | bool
  block:
    - name: Find all validations
      register: found_validations
      ansible.builtin.find:
        paths: "{{ cifmw_validations_default_path }}"
        patterns: '*.yml'
        recurse: true
        # We need to exclude this file from the list of found validations to avoid an infinite loop.
        excludes: "{{ cifmw_validations_default_path }}/main.yml"

    - name: Run all found validations
      ansible.builtin.include_tasks:
        file: xmlcreate.yml
      loop: "{{ found_validations.files }}"

- name: Run selected validations
  when: not cifmw_validations_run_all | bool
  block:
    - name: Assert all listed validations exist
      ansible.builtin.stat:
        path: "{{ cifmw_validations_default_path }}/{{ item }}"
      loop: "{{ cifmw_validations_list }}"
      register: validation_exists
      failed_when: not validation_exists.stat.exists

    - name: Run validations
      ansible.builtin.include_tasks:
        file: xmlcreate.yml
      loop: "{{ cifmw_validations_list }}"

- name: Get validations end time from system
  ansible.builtin.command:
    cmd: date +%Y-%m-%d-%H:%M:%S.%3N
  register: validations_end_time

- name: Calculate total validations run time
  ansible.builtin.set_fact:
    validations_run_time: "{{((validations_end_time.stdout | to_datetime('%Y-%m-%d-%H:%M:%S.%f')) - (validations_start_time.stdout | to_datetime('%Y-%m-%d-%H:%M:%S.%f'))).total_seconds()}}"

- name: Write first line of xml results file
  ansible.builtin.shell: |
    mkdir -p "{{ cifmw_validations_xml_status_file_dir }}"
    echo "<testsuite errors=\"{{ validations_errors }}\" failures=\"{{ validations_failed }}\" name=\"\" tests=\"{{ validations_executed }}\" time=\"{{ validations_run_time }}\">" >> {{ cifmw_validations_xml_status_file_dir }}/validations_results.xml

- name: Write individual results to xml file
  ansible.builtin.shell: |
    echo '{{ item }}' >> {{ cifmw_validations_xml_status_file_dir }}/validations_results.xml
  loop: '{{ xml_line_list }}'

- name: Write last line to xml results file
  ansible.builtin.shell: |
    echo "</testsuite>" >> {{ cifmw_validations_xml_status_file_dir }}/validations_results.xml

- name: Fail job when validations fail
  ansible.builtin.fail:
    msg: "One or more validations failed"
  when: validations_failed | int  > 0
