dependency:
  name: galaxy
  options:
    requirements-file: ../../../../requirements.yml

driver:
  name: podman

platforms:
  - name: instance
    hostname: instance
    image: "ubi9/ubi-init"
    registry:
      url: "registry.access.redhat.com"
    command: "sleep infinity"
    privileged: true
    ulimits:
      - host

provisioner:
  name: ansible
  log: true
  inventory:
    hosts:
      all:
        hosts:
          instance:
            ansible_python_interpreter: /usr/bin/python3
  env:
    ANSIBLE_STDOUT_CALLBACK: yaml
  config_options:
    defaults:
      remote_tmp: /tmp
