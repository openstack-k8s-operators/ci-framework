---
# Test bm_power_on.yml: idempotent power-on via Redfish mock.

- name: "Power_on case 1: host already On -- no action taken"
  block:
    - name: Reset mock to power On
      ansible.builtin.uri:
        url: "{{ _mock_reset_url }}"
        method: POST
        body_format: json
        body:
          power_state: "On"
        validate_certs: false
        status_code: [200]

    - name: Include bm_power_on
      ansible.builtin.include_role:
        name: reproducer
        tasks_from: bm_power_on.yml

    - name: Query mock state after power_on (already on)
      ansible.builtin.uri:
        url: "{{ _mock_state_url }}"
        validate_certs: false
      register: _state_after

    - name: Assert host is still On
      ansible.builtin.assert:
        that:
          - _state_after.json.power_state == "On"
        fail_msg: "Expected On, got {{ _state_after.json.power_state }}"

- name: "Power_on case 2: host Off -- powers on"
  block:
    - name: Reset mock to power Off
      ansible.builtin.uri:
        url: "{{ _mock_reset_url }}"
        method: POST
        body_format: json
        body:
          power_state: "Off"
        validate_certs: false
        status_code: [200]

    - name: Include bm_power_on
      ansible.builtin.include_role:
        name: reproducer
        tasks_from: bm_power_on.yml

    - name: Query mock state after power_on (was off)
      ansible.builtin.uri:
        url: "{{ _mock_state_url }}"
        validate_certs: false
      register: _state_after

    - name: Assert host is now On
      ansible.builtin.assert:
        that:
          - _state_after.json.power_state == "On"
        fail_msg: "Expected On, got {{ _state_after.json.power_state }}"
