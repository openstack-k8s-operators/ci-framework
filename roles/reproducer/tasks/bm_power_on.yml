---
# Power on the bare metal host and wait for POST to complete.
# Requires: _bmc_host, _bmc_creds, _redfish_headers
- name: Query current power state
  ansible.builtin.uri:
    url: "https://{{ _bmc_host }}/redfish/v1/Systems/System.Embedded.1"
    method: GET
    headers: "{{ _redfish_headers }}"
    user: "{{ _bmc_creds.username }}"
    password: "{{ _bmc_creds.password }}"
    validate_certs: false
    force_basic_auth: true
    status_code: [200]
  register: _power_state

- name: Power on bare metal host
  when: _power_state.json.PowerState != 'On'
  ansible.builtin.uri:
    url: "https://{{ _bmc_host }}/redfish/v1/Systems/System.Embedded.1/Actions/ComputerSystem.Reset"
    method: POST
    headers: "{{ _redfish_headers }}"
    body_format: json
    body:
      ResetType: "On"
    user: "{{ _bmc_creds.username }}"
    password: "{{ _bmc_creds.password }}"
    validate_certs: false
    force_basic_auth: true
    status_code: [200, 204]

- name: Wait for host POST to complete
  ansible.builtin.uri:
    url: "https://{{ _bmc_host }}/redfish/v1/Systems/System.Embedded.1"
    method: GET
    headers: "{{ _redfish_headers }}"
    user: "{{ _bmc_creds.username }}"
    password: "{{ _bmc_creds.password }}"
    validate_certs: false
    force_basic_auth: true
    return_content: true
    status_code: [200]
  register: _post_check
  retries: 30
  delay: 10
  until: >-
    _post_check.json.Oem.Dell.DellSystem.PostState | default('')
    in ['InPostDiscoveryComplete', 'FinishedPost'] or
    ('PostState' not in (_post_check.json.Oem.Dell.DellSystem | default({}))
    and _post_check.json.PowerState | default('') == 'On')

- name: Show POST state
  ansible.builtin.debug:
    msg: >-
      POST state:
      {{ _post_check.json.Oem.Dell.DellSystem.PostState
        | default('not supported by firmware, used PowerState='
          + _post_check.json.PowerState | default('unknown')) }}
