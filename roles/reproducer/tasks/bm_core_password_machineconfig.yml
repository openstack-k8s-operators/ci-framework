---
# Configure core user console access via MachineConfig (post-install).
# Creates a MachineConfig that sets the core user password hash.
# Requires: _work_dir, cifmw_bm_agent_core_password (user input)
- name: Generate password hash
  ansible.builtin.command:
    cmd: "openssl passwd -6 -salt 16charsofsalt '{{ cifmw_bm_agent_core_password }}'"
  register: _password_hash
  changed_when: false
  no_log: true

- name: Create openshift manifests directory
  ansible.builtin.file:
    path: "{{ _work_dir }}/openshift"
    state: directory
    mode: "0755"

- name: Write core password MachineConfig
  no_log: true
  ansible.builtin.copy:
    dest: "{{ _work_dir }}/openshift/99-core-password.yaml"
    mode: "0600"
    content: |
      apiVersion: machineconfiguration.openshift.io/v1
      kind: MachineConfig
      metadata:
        labels:
          machineconfiguration.openshift.io/role: master
        name: 99-core-password
      spec:
        config:
          ignition:
            version: 3.2.0
          passwd:
            users:
              - name: core
                passwordHash: {{ _password_hash.stdout }}
