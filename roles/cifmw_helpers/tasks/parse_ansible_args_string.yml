---
# This would help to parse variables, that
# are called in nested ansible execution using shell/command
# module.
# For example:
#
#     cmd_args: "-e@somefile.yml -e @/tmp/someotherfile.yml -e myvar=test"
#
# to:
#
#     cmd_args_vars: [{'myvar': 'test'}]
#     cmd_args_files: ['somefile.yml', '/tmp/someotherfile.yml']
#

- name: Split string of arguments into the lists of vars and files
  when: cmd_args | length > 1
  ansible.builtin.set_fact:
    cmd_args_vars: "{{ cmd_args
         | split(' -e ')
         | reject('search', '@')
         | reject('equalto', '')
         | map('regex_replace', '^(.*?)=(.*)$', '{\"\\1\": \"\\2\"}')
         | map('from_yaml')
         | list
      }}"
    cmd_args_files: "{{ cmd_args
         | split('-e')
         | select()
         | map('trim')
         | select('match', '^@.*\\.(yml|yaml)$')
         | list
         | replace('@', '')
      }}"
  no_log: "{{ cifmw_helpers_no_log }}"
