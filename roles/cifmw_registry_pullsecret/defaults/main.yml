# Enable/disable pull-secret credential extraction
cifmw_registry_pullsecret_enabled: false

# Registry URL to extract credentials for
# cifmw_registry_pullsecret_registry_url: registry.stage.redhat.io

# Whether to update the registry token file with extracted credentials
cifmw_registry_pullsecret_update_file: true

# Destination file for registry token credentials
cifmw_registry_pullsecret_dest_file: "{{ ansible_user_dir }}/secrets/registry_token_creds.yaml"
