# Example playbook to update OVN packages in OpenStack containers
#
# Usage:
#   ansible-playbook update_ovn_package.yml

- name: Update OVN package in OpenStack containers
  hosts: localhost
  gather_facts: true
  vars:
    # Target package to update
    cifmw_upic_target_package: "ovn24.03"

    # Repository configuration
    cifmw_upic_repo_name: "custom-repo"
    cifmw_upic_repo_baseurl: "http://example.com/custom-repo/"

    # OpenShift configuration
    cifmw_upic_namespace: "openstack"
    cifmw_upic_openstack_cr_name: "controlplane"

    # Registry configuration (leave commented to auto-detect)
    # cifmw_upic_image_registry: ""
    # cifmw_upic_image_registry_internal: "image-registry.openshift-image-registry.svc:5000"

    # Image naming
    cifmw_upic_image_name_prefix: "ovn-updated"

    # TLS verification (set to false for self-signed certs)
    cifmw_upic_tls_verify: false

  tasks:
    - name: Update OVN package in all OpenStack containers
      ansible.builtin.include_role:
        name: update_package_in_containers
