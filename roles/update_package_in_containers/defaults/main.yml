# ============================================================================
# Update Control Flags
# ============================================================================
# Enable/disable entire workflow
cifmw_update_container_packages: true

# Granular control over what to update:
# 1. Update control plane pod/container images
cifmw_upic_update_control_plane_images: true

# 2. Update EDPM compute container images (updates NodeSets with custom images)
cifmw_upic_update_edpm_images: true

# 3. Update packages on EDPM compute node hosts (e.g., openvswitch)
cifmw_upic_update_edpm_host_packages: true

# ============================================================================
# Base Configuration
# ============================================================================

# Base directory for artifacts and temporary files
cifmw_upic_basedir: "{{ cifmw_basedir | default(ansible_user_dir ~ '/ci-framework-data') }}"

# OpenShift namespace where OpenStack is deployed
cifmw_upic_namespace: "openstack"

# Name of the OpenStackVersion custom resource
cifmw_upic_openstack_cr_name: "controlplane"

# Target package to update (REQUIRED - must be set by user)
cifmw_upic_target_package: ""

# List of images to update with the target package
# Only these images will be updated (no package scanning is performed)
cifmw_upic_images_to_scan:
  - ovnControllerImage
  - ovnControllerOvsImage
  - ovnNbDbclusterImage
  - ovnNorthdImage
  - ovnSbDbclusterImage
  - ceilometerSgcoreImage

# Repository configuration
cifmw_upic_repo_name: "custom-repo"
cifmw_upic_repo_baseurl: ""  # REQUIRED - must be set by user
cifmw_upic_repo_enabled: 1
cifmw_upic_repo_gpgcheck: 0
cifmw_upic_repo_priority: 0
cifmw_upic_repo_sslverify: 0

# Image registry configuration
# Leave empty to auto-detect external route from OpenShift cluster
cifmw_upic_image_registry: ""

# Image naming
cifmw_upic_image_name_prefix: "updated"

# Podman/Container configuration
cifmw_upic_tls_verify: false

# Temporary directory for build context
cifmw_upic_temp_dir: ""

# DNF update arguments
cifmw_upic_update_dnf_args: "--disablerepo='*' --enablerepo={{ cifmw_upic_repo_name }}"

# Internal variables (do not override)
_cifmw_upic_modified_images: []
_cifmw_upic_updated_cr_keys: []
_cifmw_upic_total_images: 0
_cifmw_upic_processed_images: 0
