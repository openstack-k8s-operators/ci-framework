- name: Validate required parameters
  ansible.builtin.assert:
    that:
      - cifmw_upic_target_package is defined
      - cifmw_upic_target_package | length > 0
      - cifmw_upic_repo_baseurl is defined
      - cifmw_upic_repo_baseurl | length > 0
    fail_msg: "Required parameters are missing. Please set cifmw_upic_target_package and cifmw_upic_repo_baseurl"

- name: Check if oc command is available
  ansible.builtin.command: which oc
  register: _cifmw_upic_oc_check
  failed_when: false
  changed_when: false

- name: Fail if oc is not available
  ansible.builtin.fail:
    msg: "OpenShift CLI (oc) is not available. Please install it and ensure it's in your PATH."
  when: _cifmw_upic_oc_check.rc != 0

- name: Check if podman command is available
  ansible.builtin.command: which podman
  register: _cifmw_upic_podman_check
  failed_when: false
  changed_when: false

- name: Fail if podman is not available
  ansible.builtin.fail:
    msg: "Podman is not available. Please install it and ensure it's in your PATH."
  when: _cifmw_upic_podman_check.rc != 0

- name: Create temporary directory for build context
  ansible.builtin.tempfile:
    state: directory
    prefix: "upic_build_"
  register: _cifmw_upic_temp_dir_result

- name: Debug temporary directory creation
  ansible.builtin.debug:
    msg:
      - "cifmw_upic_temp_dir is defined: {{ cifmw_upic_temp_dir is defined }}"
      - "cifmw_upic_temp_dir value: '{{ cifmw_upic_temp_dir | default('NOT_SET') }}'"
      - "_cifmw_upic_temp_dir_result.path: {{ _cifmw_upic_temp_dir_result.path }}"

- name: Set temporary directory fact (only if not already set to non-empty value)
  ansible.builtin.set_fact:
    _cifmw_upic_temp_dir: "{{ _cifmw_upic_temp_dir_result.path }}"
  when: >-
    cifmw_upic_temp_dir is not defined or
    cifmw_upic_temp_dir | length == 0

- name: Set temporary directory fact (use user-provided value)
  ansible.builtin.set_fact:
    _cifmw_upic_temp_dir: "{{ cifmw_upic_temp_dir }}"
  when: >-
    cifmw_upic_temp_dir is defined and
    cifmw_upic_temp_dir | length > 0

- name: Validate temporary directory was created
  ansible.builtin.assert:
    that:
      - _cifmw_upic_temp_dir is defined
      - _cifmw_upic_temp_dir | length > 0
      - _cifmw_upic_temp_dir_result.path is defined
    fail_msg: "Failed to create temporary directory. _cifmw_upic_temp_dir: '{{ _cifmw_upic_temp_dir | default('undefined') }}'"
    success_msg: "Temporary directory created at: {{ _cifmw_upic_temp_dir }}"

- name: Authenticate with OpenShift registry
  ansible.builtin.include_tasks: authenticate.yml

- name: Fetch container images from OpenStackVersion CR
  ansible.builtin.include_tasks: fetch_images.yml

- name: Process each container image
  ansible.builtin.include_tasks: process_image.yml
  loop: "{{ _cifmw_upic_image_entries }}"
  loop_control:
    loop_var: image_entry
    label: "{{ image_entry.key }}"

- name: Display summary
  ansible.builtin.include_tasks: summary.yml

- name: Cleanup temporary directory
  ansible.builtin.file:
    path: "{{ _cifmw_upic_temp_dir }}"
    state: absent
  when: _cifmw_upic_temp_dir is defined
