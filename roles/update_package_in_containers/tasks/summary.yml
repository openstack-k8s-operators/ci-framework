- name: Display update summary
  ansible.builtin.debug:
    msg: |
      ==================================================
      Update Process Complete
      ==================================================
      Summary:
      - Total images found: {{ _cifmw_upic_total_images }}
      - Images processed: {{ _cifmw_upic_processed_images }}
      - Target package: {{ cifmw_upic_target_package }}
      - Repository: {{ cifmw_upic_repo_name }}

- name: Display updated images
  ansible.builtin.debug:
    msg: "{{ _cifmw_upic_modified_images }}"
  when: _cifmw_upic_modified_images | length > 0

- name: Display updated CR keys
  ansible.builtin.debug:
    msg: "Updated keys in OpenStackVersion CR: {{ _cifmw_upic_updated_cr_keys | join(', ') }}"
  when: _cifmw_upic_updated_cr_keys | length > 0

- name: Display no updates message
  ansible.builtin.debug:
    msg: "No images were updated. Package '{{ cifmw_upic_target_package }}' was not found in any images."
  when: _cifmw_upic_processed_images | int == 0
