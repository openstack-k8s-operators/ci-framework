- name: Early role stop if disabled
  when:
    - not cifmw_edpm_update_host_packages | default(true) | bool
  ansible.builtin.meta: end_play

- name: Validate required parameters
  ansible.builtin.assert:
    that:
      - cifmw_euhp_repo_baseurl is defined
      - cifmw_euhp_repo_baseurl | length > 0
      - cifmw_euhp_packages is defined
      - cifmw_euhp_packages | length > 0
    fail_msg: "cifmw_euhp_repo_baseurl and cifmw_euhp_packages must be defined"

- name: Display update configuration
  ansible.builtin.debug:
    msg:
      - "EDPM Host Package Update Configuration"
      - "Repository: {{ cifmw_euhp_repo_baseurl }}"
      - "Packages: {{ cifmw_euhp_packages }}"
      - "Services to restart: {{ cifmw_euhp_services_to_restart }}"

- name: Configure custom repository
  ansible.builtin.include_tasks: configure_repo.yml

- name: Backup current packages
  ansible.builtin.include_tasks: backup_packages.yml
  when: cifmw_euhp_backup_packages | bool

- name: Update packages
  ansible.builtin.include_tasks: update_packages.yml

- name: Restart services
  ansible.builtin.include_tasks: restart_services.yml
  when: cifmw_euhp_restart_services | bool

- name: Display summary
  ansible.builtin.include_tasks: summary.yml
