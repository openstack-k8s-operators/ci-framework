- name: Create custom repository file
  ansible.builtin.copy:
    dest: "/etc/yum.repos.d/{{ cifmw_euhp_repo_name }}.repo"
    mode: '0644'
    content: |
      [{{ cifmw_euhp_repo_name }}]
      name={{ cifmw_euhp_repo_name }}
      baseurl={{ cifmw_euhp_repo_baseurl }}
      enabled={{ cifmw_euhp_repo_enabled }}
      gpgcheck={{ cifmw_euhp_repo_gpgcheck }}
      priority={{ cifmw_euhp_repo_priority }}
  become: true

- name: Clean dnf cache
  ansible.builtin.command: dnf clean all
  become: true
  changed_when: true

- name: Refresh dnf cache
  ansible.builtin.command: dnf makecache
  become: true
  changed_when: false

- name: Display repository configuration
  ansible.builtin.debug:
    msg: "Custom repository '{{ cifmw_euhp_repo_name }}' configured at {{ cifmw_euhp_repo_baseurl }}"
