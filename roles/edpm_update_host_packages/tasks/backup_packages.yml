- name: Get current package versions
  ansible.builtin.shell: |
    set -o pipefail
    rpm -qa | grep -E "{{ cifmw_euhp_packages | join('|') }}" || echo "none"
  args:
    executable: /bin/bash
  register: _cifmw_euhp_current_packages
  changed_when: false
  become: true

- name: Create backup directory
  ansible.builtin.file:
    path: "/var/lib/edpm-backups/packages/{{ ansible_date_time.iso8601_basic_short }}"
    state: directory
    mode: '0755'
  become: true
  when: _cifmw_euhp_current_packages.stdout != "none"

- name: Save current package list
  ansible.builtin.copy:
    dest: "/var/lib/edpm-backups/packages/{{ ansible_date_time.iso8601_basic_short }}/packages.txt"
    content: "{{ _cifmw_euhp_current_packages.stdout }}"
    mode: '0644'
  become: true
  when: _cifmw_euhp_current_packages.stdout != "none"

- name: Display backup location
  ansible.builtin.debug:
    msg:
      - "Package versions backed up to:"
      - "/var/lib/edpm-backups/packages/{{ ansible_date_time.iso8601_basic_short }}/packages.txt"
      - "Current versions:"
      - "{{ _cifmw_euhp_current_packages.stdout_lines }}"
  when: _cifmw_euhp_current_packages.stdout != "none"
