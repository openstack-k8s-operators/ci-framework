# Repository configuration
cifmw_euhp_repo_name: "custom-updates"
cifmw_euhp_repo_baseurl: ""  # Required
cifmw_euhp_repo_enabled: 1
cifmw_euhp_repo_gpgcheck: 0
cifmw_euhp_repo_priority: 1

# Packages to update
# Can be a list of package names or a single package name
cifmw_euhp_packages:
  - openvswitch3.3
  - openvswitch-selinux-extra-policy

# Services to restart after package update
cifmw_euhp_services_to_restart:
  - openvswitch
  - ovs-vswitchd
  - ovsdb-server

# Whether to restart services immediately or wait for manual restart
cifmw_euhp_restart_services: true

# Backup existing packages before update
cifmw_euhp_backup_packages: true

# DNF update options
cifmw_euhp_dnf_options: "--best --allowerasing"

# Enable/disable role
cifmw_edpm_update_host_packages: true
