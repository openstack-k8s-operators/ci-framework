---
# vars for all for federation runs
#
# Security Configuration
cifmw_federation_debug_enabled: false
cifmw_federation_insecure_debug: false
cifmw_federation_keycloak_url_validate_certs: true
cifmw_federation_log_level: warn

# Base URLs and Domains  
cifmw_federation_domain: "{{ cifmw_federation_domain | default('apps.ocp.example.com') }}"
cifmw_federation_keycloak_namespace: openstack
cifmw_federation_run_osp_cmd_namespace: openstack

# Keycloak Configuration
cifmw_federation_keycloak_url: 'https://keycloak-{{ cifmw_federation_keycloak_namespace }}.{{ cifmw_federation_domain }}'
cifmw_federation_keystone_url: 'https://keystone-public-{{ cifmw_federation_run_osp_cmd_namespace }}.{{ cifmw_federation_domain }}'
cifmw_federation_horizon_url: 'https://horizon-{{ cifmw_federation_run_osp_cmd_namespace }}.{{ cifmw_federation_domain }}'

# Authentication Credentials (these should be overridden in production)
cifmw_federation_keycloak_admin_username: admin
cifmw_federation_keycloak_admin_password: "{{ ansible_password_hash | default('changeme') }}"

# Legacy variable defaults for backward compatibility
cifmw_federation_keycloak_realm: openstack
cifmw_federation_keycloak_realm2: openstack2
cifmw_federation_IdpName: kcIDP
cifmw_federation_IdpName2: kcIDP2
cifmw_federation_keystone_domain: SSO
cifmw_federation_keystone_domain2: SSO2
cifmw_federation_project_name: SSOproject
cifmw_federation_project_name2: SSOproject2
cifmw_federation_group_name: SSOgroup
cifmw_federation_group_name2: SSOgroup2
cifmw_federation_mapping_name: SSOmap
cifmw_federation_mapping_name2: SSOmap2
cifmw_federation_keystone_OIDC_ClientID: rhoso
cifmw_federation_keystone_OIDC_ClientSecret: COX8bmlKAWn56XCGMrKQJj7dgHNAOl6f
cifmw_federation_keystone_OIDC_ClientID2: rhoso2
cifmw_federation_keystone_OIDC_ClientSecret2: DOX8bmlKAWn56XCGNrKQJj7dgHNAOl6g
cifmw_federation_keycloak_testuser1_username: kctestuser1
cifmw_federation_keycloak_testuser1_password: changeme1
cifmw_federation_keycloak_testuser2_username: kctestuser2
cifmw_federation_keycloak_testuser2_password: changeme2
cifmw_federation_keycloak_testuser3_username: kctestuser3
cifmw_federation_keycloak_testuser3_password: changeme3
cifmw_federation_keycloak_testuser4_username: kctestuser4
cifmw_federation_keycloak_testuser4_password: changeme4
cifmw_federation_keycloak_testgroup1_name: kctestgroup1
cifmw_federation_keycloak_testgroup2_name: kctestgroup2
cifmw_federation_keycloak_testgroup3_name: kctestgroup3
cifmw_federation_keycloak_testgroup4_name: kctestgroup4

# Realm Configuration (using static values to avoid circular dependencies)
cifmw_federation_realms:
  - name: "{{ cifmw_federation_keycloak_realm }}"
    idp_name: "{{ cifmw_federation_IdpName }}"
    domain: "{{ cifmw_federation_keystone_domain }}"
    project: "{{ cifmw_federation_project_name }}"
    group: "{{ cifmw_federation_group_name }}"
    mapping: "{{ cifmw_federation_mapping_name }}"
    client_id: "{{ cifmw_federation_keystone_OIDC_ClientID }}"
    client_secret: "{{ cifmw_federation_keystone_OIDC_ClientSecret }}"
    test_users:
      - username: "{{ cifmw_federation_keycloak_testuser1_username }}"
        password: "{{ cifmw_federation_keycloak_testuser1_password }}"
        group: "{{ cifmw_federation_keycloak_testgroup1_name }}"
      - username: "{{ cifmw_federation_keycloak_testuser2_username }}"
        password: "{{ cifmw_federation_keycloak_testuser2_password }}"
        group: "{{ cifmw_federation_keycloak_testgroup2_name }}"
  - name: "{{ cifmw_federation_keycloak_realm2 }}"
    idp_name: "{{ cifmw_federation_IdpName2 }}"
    domain: "{{ cifmw_federation_keystone_domain2 }}"
    project: "{{ cifmw_federation_project_name2 }}"
    group: "{{ cifmw_federation_group_name2 }}"
    mapping: "{{ cifmw_federation_mapping_name2 }}"
    client_id: "{{ cifmw_federation_keystone_OIDC_ClientID2 }}"
    client_secret: "{{ cifmw_federation_keystone_OIDC_ClientSecret2 }}"
    test_users:
      - username: "{{ cifmw_federation_keycloak_testuser3_username }}"
        password: "{{ cifmw_federation_keycloak_testuser3_password }}"
        group: "{{ cifmw_federation_keycloak_testgroup3_name }}"
      - username: "{{ cifmw_federation_keycloak_testuser4_username }}"
        password: "{{ cifmw_federation_keycloak_testuser4_password }}"
        group: "{{ cifmw_federation_keycloak_testgroup4_name }}"

# Remote IDs
cifmw_federation_remote_id: '{{ cifmw_federation_keycloak_url }}/auth/realms/{{ cifmw_federation_keycloak_realm }}'
cifmw_federation_remote_id2: '{{ cifmw_federation_keycloak_url }}/auth/realms/{{ cifmw_federation_keycloak_realm2 }}'

# OIDC Configuration
cifmw_federation_rules_file: rules.json
cifmw_federation_clame_id: OIDC-preferred_username
cifmw_federation_keystone_OIDC_ClaimDelimiter: ";"
cifmw_federation_keystone_OIDC_ClaimPrefix: "OIDC-"
cifmw_federation_keystone_OIDC_PassClaimsAs: "both"
cifmw_federation_keystone_OIDC_PassUserInfoAs: "claims"
cifmw_federation_keystone_OIDC_ResponseType: "id_token"
cifmw_federation_keystone_OIDC_Scope: "openid email profile"
cifmw_federation_keystone_OIDC_CryptoPassphrase: "openstack"
cifmw_federation_keystone_OIDC_ProviderMetadataURL: "{{ cifmw_federation_keycloak_url }}/auth/realms/{{ cifmw_federation_keycloak_realm }}/.well-known/openid-configuration"
cifmw_federation_keystone_OIDC_ProviderMetadataURL2: "{{ cifmw_federation_keycloak_url }}/auth/realms/{{ cifmw_federation_keycloak_realm2 }}/.well-known/openid-configuration"
cifmw_federation_keystone_OIDC_OAuthIntrospectionEndpoint: "{{ cifmw_federation_keycloak_url }}/auth/realms/{{ cifmw_federation_keycloak_realm }}/protocol/openid-connect/token/introspect"

# Federation metadata file naming
cifmw_federation_keystone_idp1_conf_filename: "https%3A%2F%2Fkeycloak-{{ cifmw_federation_keycloak_namespace }}.{{ cifmw_federation_domain }}%2Fauth%2Frealms%2F{{ cifmw_federation_keycloak_realm }}.conf"
cifmw_federation_keystone_idp1_client_filename: "https%3A%2F%2Fkeycloak-{{ cifmw_federation_keycloak_namespace }}.{{ cifmw_federation_domain }}%2Fauth%2Frealms%2F{{ cifmw_federation_keycloak_realm }}.client"
cifmw_federation_keystone_idp1_provider_filename: "https%3A%2F%2Fkeycloak-{{ cifmw_federation_keycloak_namespace }}.{{ cifmw_federation_domain }}%2Fauth%2Frealms%2F{{ cifmw_federation_keycloak_realm }}.provider"
cifmw_federation_keystone_idp2_conf_filename: "https%3A%2F%2Fkeycloak-{{ cifmw_federation_keycloak_namespace }}.{{ cifmw_federation_domain }}%2Fauth%2Frealms%2F{{ cifmw_federation_keycloak_realm2 }}.conf"
cifmw_federation_keystone_idp2_client_filename: "https%3A%2F%2Fkeycloak-{{ cifmw_federation_keycloak_namespace }}.{{ cifmw_federation_domain }}%2Fauth%2Frealms%2F{{ cifmw_federation_keycloak_realm2 }}.client"
cifmw_federation_keystone_idp2_provider_filename: "https%3A%2F%2Fkeycloak-{{ cifmw_federation_keycloak_namespace }}.{{ cifmw_federation_domain }}%2Fauth%2Frealms%2F{{ cifmw_federation_keycloak_realm2 }}.provider"
