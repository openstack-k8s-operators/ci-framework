- name: Generate WebSSO choices for realms
  ansible.builtin.set_fact:
    cifmw_federation_websso_choices: >-
      {% for realm in cifmw_federation_realms -%}
      ("OIDC{{ loop.index }}", _("OpenID Connect {{ realm.name | title }}")),
      {%- endfor %}

- name: Generate WebSSO IdP mapping for realms
  ansible.builtin.set_fact:
    cifmw_federation_websso_idp_mapping: >-
      {% for realm in cifmw_federation_realms -%}
      "OIDC{{ loop.index }}": ("{{ realm.idp_name }}", "openid"),
      {%- endfor %}

- name: Create file to customize horizon for Federation resources deployed in the control plane
  ansible.builtin.copy:
    dest: "{{ cifmw_basedir }}/artifacts/manifests/kustomizations/controlplane/horizon_federation.yaml"
    mode: "0644"
    content: |-
      apiVersion: kustomize.config.k8s.io/v1beta1
      kind: Kustomization
      resources:
      - namespace: {{ cifmw_federation_run_osp_cmd_namespace }}
      patches:
      - target:
          kind: OpenStackControlPlane
          name: .*
        patch: |-
          - op: add
            path: /spec/horizon/enabled
            value: true
          - op: add
            path: /spec/horizon/template/memcachedInstance
            value: memcached
          - op: add
            path: /spec/horizon/template/customServiceConfig
            value: |
              OPENSTACK_KEYSTONE_URL = "{{ cifmw_federation_keystone_url }}/v3"
              WEBSSO_ENABLED = True
              WEBSSO_CHOICES = (
                ("credentials", _("Keystone Credentials")),
                {{ cifmw_federation_websso_choices.rstrip(',') }}
              )
              WEBSSO_IDP_MAPPING = {
                {{ cifmw_federation_websso_idp_mapping.rstrip(',') }}
              }

- name: Display horizon configuration summary
  ansible.builtin.debug:
    msg:
      - "Horizon federation configuration completed"
      - "Configured {{ cifmw_federation_realms | length }} realm(s)"
      - "WebSSO enabled for realms: {{ cifmw_federation_realms | map(attribute='name') | list | join(', ') }}"
