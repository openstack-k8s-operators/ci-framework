- name: Validate post-deploy configuration
  ansible.builtin.assert:
    that:
      - cifmw_federation_realms is defined
      - cifmw_federation_realms | length > 0
    fail_msg: "Federation realms configuration is required for post-deploy"
    success_msg: "Post-deploy configuration validation passed"

- name: Run federation OpenStack setup for all realms
  ansible.builtin.include_tasks: run_openstack_setup.yml

- name: Run federation OpenStack authentication setup
  ansible.builtin.include_tasks: run_openstack_auth_setup.yml

- name: Run federation authentication tests
  block:
    - name: Test federation authentication with test users
      ansible.builtin.include_tasks: run_openstack_auth_test.yml
      vars:
        cifmw_federation_test_user: "{{ user_info.1 }}"
        cifmw_federation_test_realm: "{{ user_info.0 }}"
      loop: "{{ cifmw_federation_realms | subelements('test_users') | list }}"
      loop_control:
        loop_var: user_info
        label: "{{ user_info.0.name }}/{{ user_info.1.username }}"
      when: cifmw_federation_run_tests | default(true)

  rescue:
    - name: Handle authentication test failure
      ansible.builtin.debug:
        msg: "Federation authentication tests failed, but deployment may still be functional. Manual verification recommended."

- name: Display post-deploy completion summary
  ansible.builtin.debug:
    msg:
      - "Federation post-deploy setup completed successfully"
      - "Keycloak URL: {{ cifmw_federation_keycloak_url }}"
      - "Keystone URL: {{ cifmw_federation_keystone_url }}"
      - "Horizon URL: {{ cifmw_federation_horizon_url }}"
      - "Configured realms: {{ cifmw_federation_realms | map(attribute='name') | list | join(', ') }}"
      - "Test users configured: {{ cifmw_federation_realms | subelements('test_users') | map('last') | map(attribute='username') | list | join(', ') }}"
