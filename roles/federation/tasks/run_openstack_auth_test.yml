- name: Read federation test user1 cloudrc template
  ansible.builtin.template:
    src: kctestuser1rc.j2
    dest: "{{ ansible_user_dir }}/ci-framework-data/tmp/{{ cifmw_federation_keycloak_testuser1_username }}rc"

- name: Copy federation test user1 cloudrc file into pod
  kubernetes.core.k8s_cp:
    namespace: "{{ cifmw_federation_run_osp_cmd_namespace }}"
    pod: openstackclient
    remote_path: "/home/cloud-admin/{{ cifmw_federation_keycloak_testuser1_username }}rc"
    local_path: "{{ ansible_user_dir }}/ci-framework-data/tmp/{{ cifmw_federation_keycloak_testuser1_username }}rc"

- name: Copy system CA bundle
  ansible.builtin.copy:
    src: "/etc/pki/ca-trust/extracted/pem/tls-ca-bundle.pem"
    dest: "{{ ansible_user_dir }}/ci-framework-data/tmp/full-ca-list.crt"

- name: Get ingress operator CA cert
  ansible.builtin.slurp:
    src: "{{ ansible_user_dir }}/ci-framework-data/tmp/ingress-operator-ca.crt"
  register: federation_sso_ca

- name: Add ingress operator CA to bundle
  ansible.builtin.blockinfile:
    path: "{{ ansible_user_dir }}/ci-framework-data/tmp/full-ca-list.crt"
    block: "{{ federation_sso_ca.content | b64decode }}"

- name: Copy CA bundle to openstackclient pod
  kubernetes.core.k8s_cp:
    namespace: "{{ cifmw_federation_run_osp_cmd_namespace }}"
    pod: openstackclient
    remote_path: "/home/cloud-admin/full-ca-list.crt"
    local_path: "{{ ansible_user_dir }}/ci-framework-data/tmp/full-ca-list.crt"

- name: Get testuser1 token
  environment:
    KUBECONFIG: "{{ cifmw_openshift_kubeconfig }}"
    PATH: "{{ cifmw_path }}"
  ansible.builtin.shell: |
    set -xe -o pipefail
    oc rsh openstackclient
    source /home/cloud-admin/{{ cifmw_federation_keycloak_testuser1_username }}rc
    openstack token issue -f yaml
  register: federation_sso_testuser1_token
