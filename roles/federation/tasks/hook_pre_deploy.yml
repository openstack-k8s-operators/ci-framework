- name: Validate pre-deploy configuration
  ansible.builtin.assert:
    that:
      - cifmw_federation_realms is defined
      - cifmw_federation_realms | length > 0
    fail_msg: "Federation realms configuration is required for pre-deploy"
    success_msg: "Pre-deploy configuration validation passed"

- name: Set deployment type detection
  ansible.builtin.set_fact:
    cifmw_federation_deploy_type: "{{ 'crc' if (ansible_user_dir + '/.crc') | path_exists else 'ocp' }}"
  when: cifmw_federation_deploy_type is not defined

- name: Run SSO pod setup on OpenShift
  ansible.builtin.include_tasks: run_keycloak_setup.yml

- name: Run SSO realm setup for all realms
  ansible.builtin.include_tasks: run_keycloak_realm_setup.yml

- name: Display pre-deploy completion summary
  ansible.builtin.debug:
    msg:
      - "Federation pre-deploy setup completed successfully"
      - "Keycloak URL: {{ cifmw_federation_keycloak_url }}"
      - "Deployment type: {{ cifmw_federation_deploy_type }}"
      - "Configured realms: {{ cifmw_federation_realms | map(attribute='name') | list | join(', ') }}"
