# Main federation role entry point
# 
# Note: This role is typically called through hook files that import
# specific task files using tasks_from parameter. This main.yml serves
# as a fallback for direct role calls.

- name: Display federation role information
  ansible.builtin.debug:
    msg:
      - "Federation role loaded successfully"
      - "This role sets up OpenStack Keystone federation with Keycloak"
      - "Typically called through hook files with specific task imports"
      - "Available task files:"
      - "  - hook_pre_deploy.yml: Sets up Keycloak and realms"
      - "  - hook_controlplane_config.yml: Configures single realm federation"
      - "  - hook_multirealm_controlplane_config.yml: Configures multi-realm federation"
      - "  - hook_horizon_controlplane_config.yml: Configures Horizon"
      - "  - hook_post_deploy.yml: Sets up auth and runs tests"

- name: Validate basic federation configuration when called directly
  ansible.builtin.assert:
    that:
      - cifmw_federation_keycloak_namespace is defined
      - cifmw_federation_run_osp_cmd_namespace is defined
    fail_msg: "Basic federation configuration variables are missing"
    success_msg: "Basic federation configuration validation passed"
  when: ansible_play_hosts | length == 1  # Only validate when called directly 