# ---------------------------------------------------------------------------
# Step 1 – read the Keycloak CA cert written by federation-pre-deploy
# ---------------------------------------------------------------------------
- name: Get ingress operator CA cert
  ansible.builtin.slurp:
    src: "{{ [ansible_user_dir, 'ci-framework-data', 'tmp', 'ingress-operator-ca.crt'] | path_join }}"
  register: federation_sso_ca

# ---------------------------------------------------------------------------
# Step 2 – determine CA handling mode
#
# When cifmw_federation_ca_bundle_secret_name is set we merge the Keycloak CA
# into that secret (creating it if absent).  The kustomization patch then
# does NOT touch spec.tls.caBundleSecretName because the control plane CR is
# assumed to already reference the correct secret (e.g. custom-ca-certs).
#
# When cifmw_federation_ca_bundle_secret_name is empty we fall back to the
# original behaviour: create a dedicated 'keycloakca' secret and patch
# spec.tls.caBundleSecretName to point at it.
# ---------------------------------------------------------------------------
- name: Set federation CA merge mode flag
  ansible.builtin.set_fact:
    _federation_merge_ca: "{{ cifmw_federation_ca_bundle_secret_name | length > 0 }}"

- name: Look up existing CA bundle secret
  when: _federation_merge_ca | bool
  kubernetes.core.k8s_info:
    kubeconfig: "{{ cifmw_openshift_kubeconfig }}"
    api_version: v1
    kind: Secret
    name: "{{ cifmw_federation_ca_bundle_secret_name }}"
    namespace: "{{ cifmw_federation_run_osp_cmd_namespace }}"
  register: _federation_existing_ca_bundle

- name: Capture existing CA bundle secret data
  when: _federation_merge_ca | bool
  ansible.builtin.set_fact:
    _federation_ca_bundle_existing_data: >-
      {{
        (_federation_existing_ca_bundle.resources | first).data
        if _federation_existing_ca_bundle.resources | length > 0
        else {}
      }}

# ---------------------------------------------------------------------------
# Step 3a – merge Keycloak CA into the existing / new bundle secret
# ---------------------------------------------------------------------------
- name: Create or update CA bundle secret with Keycloak CA cert
  when: _federation_merge_ca | bool
  kubernetes.core.k8s:
    kubeconfig: "{{ cifmw_openshift_kubeconfig }}"
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      type: Opaque
      metadata:
        name: "{{ cifmw_federation_ca_bundle_secret_name }}"
        namespace: "{{ cifmw_federation_run_osp_cmd_namespace }}"
      data: >-
        {{
          _federation_ca_bundle_existing_data |
          combine({'keycloak-ca.crt': federation_sso_ca.content})
        }}

# ---------------------------------------------------------------------------
# Step 3b – original path: create a dedicated keycloakca secret
# ---------------------------------------------------------------------------
- name: Add dedicated Keycloak CA secret
  when: not (_federation_merge_ca | bool)
  kubernetes.core.k8s:
    kubeconfig: "{{ cifmw_openshift_kubeconfig }}"
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      type: Opaque
      metadata:
        name: keycloakca
        namespace: "{{ cifmw_federation_run_osp_cmd_namespace }}"
      data:
        KeyCloakCA: "{{ federation_sso_ca.content }}"

# ---------------------------------------------------------------------------
# Step 4 – create the kustomization that patches the Keystone OSCP.
#
# Merge mode:  only patch httpdCustomization and customServiceConfig.
#              caBundleSecretName is already correctly set in the CR.
#
# Dedicated-secret mode:  also patch spec.tls.caBundleSecretName (original
#                          behaviour).
# ---------------------------------------------------------------------------
- name: Ensure kustomization controlplane directory exists
  ansible.builtin.file:
    path: "{{ cifmw_manifests_dir }}/kustomizations/controlplane"
    state: directory
    mode: "0755"

- name: Create Keystone federation kustomization (merge into existing CA bundle)
  when: _federation_merge_ca | bool
  ansible.builtin.copy:
    dest: "{{ cifmw_manifests_dir }}/kustomizations/controlplane/keystone_federation.yaml"
    mode: "0644"
    content: |-
      apiVersion: kustomize.config.k8s.io/v1beta1
      kind: Kustomization
      resources:
      - namespace: {{ cifmw_federation_run_osp_cmd_namespace }}
      patches:
      - target:
          kind: OpenStackControlPlane
          name: .*
        patch: |-
          - op: add
            path: /spec/keystone/template/httpdCustomization
            value:
              customConfigSecret: keystone-httpd-override
          - op: add
            path: /spec/keystone/template/customServiceConfig
            value: |
              [DEFAULT]
              insecure_debug=true
              debug=true
              [federation]
              trusted_dashboard={{ cifmw_federation_horizon_url }}/dashboard/auth/websso/
              [openid]
              remote_id_attribute=HTTP_OIDC_ISS
              [auth]
              methods = password,token,oauth1,mapped,application_credential,openid

- name: Create Keystone federation kustomization (dedicated keycloakca secret)
  when: not (_federation_merge_ca | bool)
  ansible.builtin.copy:
    dest: "{{ cifmw_manifests_dir }}/kustomizations/controlplane/keystone_federation.yaml"
    mode: "0644"
    content: |-
      apiVersion: kustomize.config.k8s.io/v1beta1
      kind: Kustomization
      resources:
      - namespace: {{ cifmw_federation_run_osp_cmd_namespace }}
      patches:
      - target:
          kind: OpenStackControlPlane
          name: .*
        patch: |-
          - op: add
            path: /spec/tls
            value: {}
          - op: add
            path: /spec/tls/caBundleSecretName
            value: keycloakca
          - op: add
            path: /spec/keystone/template/httpdCustomization
            value:
              customConfigSecret: keystone-httpd-override
          - op: add
            path: /spec/keystone/template/customServiceConfig
            value: |
              [DEFAULT]
              insecure_debug=true
              debug=true
              [federation]
              trusted_dashboard={{ cifmw_federation_horizon_url }}/dashboard/auth/websso/
              [openid]
              remote_id_attribute=HTTP_OIDC_ISS
              [auth]
              methods = password,token,oauth1,mapped,application_credential,openid

# ---------------------------------------------------------------------------
# Step 5 – create the Keystone httpd override secret (always needed)
# ---------------------------------------------------------------------------
- name: Create Keystone httpd override secret for Federation
  kubernetes.core.k8s:
    kubeconfig: "{{ cifmw_openshift_kubeconfig }}"
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: keystone-httpd-override
        namespace: "{{ cifmw_federation_run_osp_cmd_namespace }}"
      type: Opaque
      stringData:
        federation.conf: "{{ lookup('template', 'federation-single.conf.j2') }}"

# ---------------------------------------------------------------------------
# Step 6 – directly patch the OpenStackControlPlane CR.
#
# The kustomization file written in Step 4 is only consumed by the
# edpm_prepare / ci_kustomize flow (CRC/devscripts).  In the
# kustomize_deploy flow (SKMO), nothing reads that directory, so we
# also apply the patch directly here.
#
# This task requires the OSCP to already exist, so the hook must be
# called from a post_stage_run (after the control-plane stage has
# applied the CR), not a pre_stage_run.
# ---------------------------------------------------------------------------
- name: Check if OpenStackControlPlane exists
  kubernetes.core.k8s_info:
    kubeconfig: "{{ cifmw_openshift_kubeconfig }}"
    api_version: core.openstack.org/v1beta1
    kind: OpenStackControlPlane
    name: controlplane
    namespace: "{{ cifmw_federation_run_osp_cmd_namespace }}"
  register: _federation_oscp_info

- name: Patch OpenStackControlPlane with Keystone federation config
  when: _federation_oscp_info.resources | length > 0
  kubernetes.core.k8s:
    kubeconfig: "{{ cifmw_openshift_kubeconfig }}"
    state: patched
    definition:
      apiVersion: core.openstack.org/v1beta1
      kind: OpenStackControlPlane
      metadata:
        name: controlplane
        namespace: "{{ cifmw_federation_run_osp_cmd_namespace }}"
      spec:
        keystone:
          template:
            httpdCustomization:
              customConfigSecret: keystone-httpd-override
            customServiceConfig: |
              [DEFAULT]
              insecure_debug=true
              debug=true
              [federation]
              trusted_dashboard={{ cifmw_federation_horizon_url }}/dashboard/auth/websso/
              [openid]
              remote_id_attribute=HTTP_OIDC_ISS
              [auth]
              methods = password,token,oauth1,mapped,application_credential,openid

- name: Patch OpenStackControlPlane to set caBundleSecretName (dedicated keycloakca secret mode)
  when:
    - not (_federation_merge_ca | bool)
    - _federation_oscp_info.resources | length > 0
  kubernetes.core.k8s:
    kubeconfig: "{{ cifmw_openshift_kubeconfig }}"
    state: patched
    definition:
      apiVersion: core.openstack.org/v1beta1
      kind: OpenStackControlPlane
      metadata:
        name: controlplane
        namespace: "{{ cifmw_federation_run_osp_cmd_namespace }}"
      spec:
        tls:
          caBundleSecretName: keycloakca
