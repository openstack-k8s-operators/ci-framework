---
# Test playbook for stackviz integration
# Usage: ansible-playbook -i <inventory> test-stackviz-integration.yml
- name: Test stackviz integration with test_operator
  hosts: localhost
  gather_facts: true
  vars:
    # Enable stackviz generation (this is default=true anyway)
    cifmw_test_operator_generate_stackviz: true

    # Customize artifacts path for easy access
    cifmw_test_operator_artifacts_basedir: "{{ ansible_user_dir }}/stackviz-test-artifacts"

    # Test operator configuration
    cifmw_test_operator_stages:
      - name: smoke-tests
        type: tempest

    # Minimal tempest configuration for quick test
    cifmw_test_operator_tempest_include_list: |
      tempest.api.identity.v3.test_tokens.TokensV3Test.test_create_token

    # Use existing OpenShift/K8s connection
    # cifmw_openshift_kubeconfig: "{{ lookup('env', 'KUBECONFIG') }}"
    # cifmw_test_operator_namespace: openstack

  roles:
    - role: test_operator

  post_tasks:
    - name: Display stackviz report location
      ansible.builtin.debug:
        msg: |
          ===================================================
          Test Complete! Check stackviz report at:
          {{ stackviz_html_path | default(cifmw_test_operator_artifacts_basedir ~ '/stackviz/tempest-viz.html') }}

          Open in browser with:
          {% if ansible_os_family == 'Darwin' %}
          open {{ stackviz_html_path | default(cifmw_test_operator_artifacts_basedir ~ '/stackviz/tempest-viz.html') }}
          {% else %}
          xdg-open {{ stackviz_html_path | default(cifmw_test_operator_artifacts_basedir ~ '/stackviz/tempest-viz.html') }}
          {% endif %}
          ===================================================
      when: stackviz_html_path is defined or cifmw_test_operator_generate_stackviz | default(true)

    - name: Verify stackviz files exist
      ansible.builtin.stat:
        path: "{{ item }}"
      register: stackviz_files
      loop:
        - "{{ cifmw_test_operator_artifacts_basedir }}/stackviz/tempest_results.subunit"
        - "{{ cifmw_test_operator_artifacts_basedir }}/stackviz/tempest-viz.html"

    - name: Display verification results
      ansible.builtin.debug:
        msg: "File {{ item.item }}: {{ 'EXISTS' if item.stat.exists else 'NOT FOUND' }}"
      loop: "{{ stackviz_files.results }}"

    - name: Open stackviz report in browser (optional)
      ansible.builtin.command:
        cmd: "{{ 'open' if ansible_os_family == 'Darwin' else 'xdg-open' }} {{ stackviz_html_path }}"
      when:
        - stackviz_html_path is defined
        - cifmw_test_operator_stackviz_auto_open | default(false)
      ignore_errors: true
      changed_when: false
