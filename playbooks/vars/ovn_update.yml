# Variables for updating OVN package in OpenStack containers
# This replicates the original bash script configuration
#
# Usage:
#   ansible-playbook playbooks/update_container_packages.yml -e @playbooks/vars/ovn_update.yml

# Target package to update
cifmw_upic_target_package: "ovn24.03"

# Repository configuration
cifmw_upic_repo_name: "rhel-9-fdp"
cifmw_upic_repo_baseurl: "http://example.com/custom-repo/"
cifmw_upic_repo_enabled: 1
cifmw_upic_repo_gpgcheck: 0
cifmw_upic_repo_priority: 0
cifmw_upic_repo_sslverify: 0

# OpenShift/OpenStack configuration
cifmw_upic_namespace: "openstack"
cifmw_upic_openstack_cr_name: "controlplane"

# Registry configuration
# Leave empty to auto-detect from OpenShift cluster
# cifmw_upic_image_registry: ""
# cifmw_upic_image_registry_internal: "image-registry.openshift-image-registry.svc:5000"

# Image naming
cifmw_upic_image_name_prefix: "ovn-updated"

# Container/Podman configuration
cifmw_upic_tls_verify: false

# DNF update arguments
cifmw_upic_update_dnf_args: "--disablerepo='*' --enablerepo={{ cifmw_upic_repo_name }}"
