# Variables for updating Neutron package in OpenStack containers
#
# Usage:
#   ansible-playbook playbooks/update_container_packages.yml -e @playbooks/vars/neutron_update.yml

# Target package to update
cifmw_upic_target_package: "openstack-neutron"

# Repository configuration
cifmw_upic_repo_name: "custom-neutron-repo"
cifmw_upic_repo_baseurl: "http://custom-repo.example.com/neutron/"

# OpenShift/OpenStack configuration
cifmw_upic_namespace: "openstack"
cifmw_upic_openstack_cr_name: "controlplane"

# Image naming
cifmw_upic_image_name_prefix: "neutron-hotfix"

# Container/Podman configuration
cifmw_upic_tls_verify: false
