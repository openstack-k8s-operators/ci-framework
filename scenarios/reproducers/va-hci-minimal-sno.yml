---
cifmw_parent_scenario: "scenarios/reproducers/va-hci-base.yml"

cifmw_devscripts_sno: true
cifmw_reproducer_allow_one_ocp: true

# Force use CPU passtrhough in OCP to avoid performance degradation
# when nested virtualization was used.
cifmw_devscripts_cpu_passthrough: true

## devscript support for OCP deploy
# Libvirt ocpbm gateway (must match networks.ocpbm address 192.168.111.1 above).
# Required when manage_br_bridge is "n"; otherwise 135_patch_src uses the
# hypervisor management IP and libvirt rejects the DHCP range on 192.168.111.x.
cifmw_devscripts_host_bm_net_ip_addr: "192.168.111.1"

cifmw_devscripts_config_overrides:
  fips_mode: "{{ cifmw_fips_enabled | default(false) | bool }}"
  num_masters: 1
  master_memory: 16384
  master_disk: 120
  master_vcpu: 12
  external_subnet_v4: 192.168.111.0/24
  ip_stack: v4
  agent_e2e_test_scenario: SNO_IPV4
  agent_platform_type: none
  openshift_release_type: ga
  openshift_version: stable-4.18
  ntp_servers: pool.ntp.org
