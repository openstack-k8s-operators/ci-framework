---
# bgp-l3-xl.yml MUST be included
# in addition to this file (dz-storage.yml)

cifmw_devscripts_enable_iscsi_on_ocp_nodes: true
cifmw_devscripts_enable_multipath_on_ocp_nodes: true

# override some values from bgp-l3-xl.yml
cifmw_architecture_scenario: dz-storage
cifmw_arch_automation_file: "dz-storage.yaml"
cifmw_architecture_automation_file: >-
  {{
    (_arch_repo,
     'automation/vars',
     cifmw_arch_automation_file) |
    path_join
  }}
